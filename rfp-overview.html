<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RFP Overview — CAPS Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/dashboard.css">
  <style>
    .chart-container { position: relative; width: 100%; }
    .chart-container.h300 { height: 320px; }
    .chart-container.h350 { height: 370px; }
    .chart-container.h400 { height: 420px; }
    .ca-global-filter {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--ca-white);
      border: 1px solid var(--ca-gray-200);
      border-radius: var(--radius-lg);
      padding: 14px 20px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
      flex-wrap: wrap;
    }
    .ca-global-filter__label {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--ca-gray-700);
    }
    .ca-global-filter select {
      padding: 8px 14px;
      border: 1px solid var(--ca-gray-300);
      border-radius: var(--radius-sm);
      font-family: var(--font-family);
      font-size: 0.88rem;
      color: var(--ca-gray-700);
      background: var(--ca-white);
      cursor: pointer;
      min-width: 200px;
    }
    .ca-global-filter select:focus {
      border-color: var(--ca-blue);
      box-shadow: 0 0 0 3px rgba(46,80,144,0.12);
      outline: none;
    }
    .ca-global-filter__count {
      font-size: 0.82rem;
      color: var(--ca-gray-500);
      margin-left: auto;
    }
    .ca-global-filter__count strong {
      color: var(--ca-blue);
      font-weight: 700;
    }
    .ca-section-label {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--ca-navy);
      margin: 28px 0 14px 0;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--ca-light-blue);
    }
    .ca-legend-inline {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      padding: 8px 0 4px;
      font-size: 0.8rem;
      color: var(--ca-gray-500);
    }
    .ca-legend-inline span { display: inline-flex; align-items: center; gap: 5px; }
    .ca-legend-dot {
      width: 10px; height: 10px; border-radius: 3px; display: inline-block;
    }
    /* Info button styles are in dashboard.css (shared) */
    /* ── Sortable table headers ── */
    .iv-tbl-sort { cursor: pointer; user-select: none; transition: background 0.12s, color 0.12s; }
    .iv-tbl-sort:hover { background: var(--ca-gray-100); color: var(--ca-gray-700); }
    .sort-active  { color: var(--ca-blue) !important; background: rgba(45,96,196,0.06) !important; }
    .sort-arrows  { display: inline-flex; flex-direction: column; margin-left: 5px; gap: 1px; vertical-align: middle; line-height: 1; position: relative; top: -1px; }
    .sort-arrows .arr     { font-size: 0.6rem; opacity: 0.3; line-height: 1; }
    .sort-arrows .arr.on  { opacity: 1; color: var(--ca-blue); }

    /* ── Page header w/ CTA on the right ── */
    .ca-page-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 20px; flex-wrap: wrap;
    }
    .ca-page-header__text { flex: 1; min-width: 280px; }

    /* ── Reports CTA — same shape as Top Target States CTA ── */
    .cta-reports {
      position: relative;
      display: inline-flex; align-items: center; gap: 10px;
      padding: 12px 22px;
      background: linear-gradient(135deg, var(--ca-navy) 0%, var(--ca-blue) 55%, #4F80E0 100%);
      color: #fff; text-decoration: none;
      font-family: var(--font-family); font-size: 0.92rem; font-weight: 700;
      letter-spacing: 0.02em;
      border-radius: 30px;
      box-shadow: 0 6px 18px -4px rgba(27,47,94,0.45), 0 2px 4px rgba(45,96,196,0.25);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      white-space: nowrap; overflow: hidden;
      border: none; cursor: pointer;
    }
    .cta-reports::before {
      content: ''; position: absolute; top: 0; left: -60%;
      width: 50%; height: 100%;
      background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.22) 50%, transparent 100%);
      transform: skewX(-20deg);
      animation: cta-sheen-r 3.2s ease-in-out infinite;
    }
    @keyframes cta-sheen-r { 0%,15% {left:-60%;} 55%,100% {left:140%;} }
    .cta-reports:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px -4px rgba(27,47,94,0.55), 0 4px 8px rgba(45,96,196,0.3);
    }
    .cta-reports:active { transform: translateY(0); }
    .cta-reports__icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 22px; height: 22px; border-radius: 50%;
      background: rgba(255,255,255,0.18);
      font-size: 0.95rem;
    }
    .cta-reports__arrow {
      font-size: 1.05rem; line-height: 1;
      transition: transform 0.18s ease;
    }
    .cta-reports:hover .cta-reports__arrow { transform: translateX(3px); }

    /* ── Reports modal ── */
    .reports-modal {
      position: fixed; inset: 0; z-index: 1000;
      display: none; align-items: center; justify-content: center;
      padding: 20px;
    }
    .reports-modal.is-open { display: flex; }
    .reports-modal__backdrop {
      position: absolute; inset: 0;
      background: rgba(15,27,46,0.55);
      backdrop-filter: blur(2px);
    }
    .reports-modal__panel {
      position: relative; z-index: 1;
      background: var(--ca-white);
      border-radius: var(--radius-lg);
      box-shadow: 0 24px 60px -10px rgba(0,0,0,0.35);
      width: 100%; max-width: 480px;
      padding: 28px;
      animation: rm-pop 0.18s ease-out;
    }
    @keyframes rm-pop {
      from { opacity: 0; transform: translateY(8px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0)     scale(1); }
    }
    .reports-modal__header {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 12px; margin-bottom: 20px;
    }
    .reports-modal__title {
      font-size: 1.15rem; font-weight: 700; color: var(--ca-navy); margin: 0;
    }
    .reports-modal__sub {
      font-size: 0.82rem; color: var(--ca-gray-500); margin: 4px 0 0; font-weight: 500;
    }
    .reports-modal__close {
      background: none; border: none; cursor: pointer;
      width: 28px; height: 28px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--ca-gray-500); font-size: 1.2rem;
      transition: background 0.15s, color 0.15s;
    }
    .reports-modal__close:hover { background: var(--ca-gray-100); color: var(--ca-navy); }

    .reports-form { display: grid; gap: 14px; }
    .reports-form__field { display: flex; flex-direction: column; gap: 6px; }
    .reports-form__label {
      font-size: 0.78rem; font-weight: 600; color: var(--ca-gray-700);
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .reports-form__select {
      padding: 10px 14px; border: 1px solid var(--ca-gray-300);
      border-radius: var(--radius-sm);
      font-family: var(--font-family); font-size: 0.92rem; color: var(--ca-gray-700);
      background: var(--ca-white); cursor: pointer;
      transition: border-color 0.12s, box-shadow 0.12s;
    }
    .reports-form__select:focus {
      border-color: var(--ca-blue);
      box-shadow: 0 0 0 3px rgba(46,80,144,0.12); outline: none;
    }
    .reports-form__select:disabled {
      background: var(--ca-gray-100); cursor: not-allowed; color: var(--ca-gray-400);
    }
    .reports-form__row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .reports-form__hint {
      font-size: 0.78rem; color: var(--ca-gray-500); margin-top: -4px;
    }

    .reports-modal__actions {
      display: flex; gap: 10px; margin-top: 22px;
      align-items: center; justify-content: flex-end;
    }
    .reports-modal__btn {
      padding: 10px 20px; border: none; border-radius: var(--radius-sm);
      font-family: var(--font-family); font-size: 0.9rem; font-weight: 700;
      cursor: pointer; transition: background 0.12s, transform 0.1s;
    }
    .reports-modal__btn--secondary {
      background: var(--ca-gray-100); color: var(--ca-gray-700);
    }
    .reports-modal__btn--secondary:hover { background: var(--ca-gray-200); }
    .reports-modal__btn--primary {
      background: linear-gradient(135deg, var(--ca-navy) 0%, var(--ca-blue) 100%);
      color: #fff;
    }
    .reports-modal__btn--primary:hover { transform: translateY(-1px); }
    .reports-modal__btn--primary:disabled {
      background: var(--ca-gray-300); cursor: not-allowed; transform: none;
    }
    .reports-modal__error {
      font-size: 0.82rem; color: #c0322f; padding: 8px 12px;
      background: #fef2f2; border: 1px solid #fecaca; border-radius: var(--radius-sm);
      margin-top: 8px; display: none;
    }
    .reports-modal__error.is-shown { display: block; }
  </style>
</head>
<body>

  <main class="ca-main" id="dashboard">
    <div class="ca-loading">
      <div class="ca-loading__spinner"></div>
      <div class="ca-loading__text">Loading RFP data from Excel...</div>
    </div>
  </main>

  <!-- Reports modal — populated dynamically from manifest.json -->
  <div class="reports-modal" id="reports-modal" aria-hidden="true" role="dialog" aria-labelledby="reports-modal-title">
    <div class="reports-modal__backdrop" data-rm-close></div>
    <div class="reports-modal__panel" role="document">
      <div class="reports-modal__header">
        <div>
          <h2 class="reports-modal__title" id="reports-modal-title">View Team Reports</h2>
          <p class="reports-modal__sub">Select report type, period, and team — only generated reports are shown.</p>
        </div>
        <button type="button" class="reports-modal__close" aria-label="Close" data-rm-close>×</button>
      </div>

      <form class="reports-form" id="reports-form" onsubmit="return false">
        <div class="reports-form__field">
          <label class="reports-form__label" for="rm-type">Report Type</label>
          <select class="reports-form__select" id="rm-type">
            <option value="monthly">Monthly</option>
            <option value="quarterly">Quarterly</option>
          </select>
        </div>
        <div class="reports-form__row">
          <div class="reports-form__field">
            <label class="reports-form__label" for="rm-year">Year</label>
            <select class="reports-form__select" id="rm-year"></select>
          </div>
          <div class="reports-form__field">
            <label class="reports-form__label" for="rm-period"><span id="rm-period-label">Month</span></label>
            <select class="reports-form__select" id="rm-period"></select>
          </div>
        </div>
        <div class="reports-form__field">
          <label class="reports-form__label" for="rm-team">Team</label>
          <select class="reports-form__select" id="rm-team"></select>
        </div>
        <div class="reports-modal__error" id="rm-error"></div>
        <div class="reports-modal__actions">
          <button type="button" class="reports-modal__btn reports-modal__btn--secondary" data-rm-close>Cancel</button>
          <button type="button" class="reports-modal__btn reports-modal__btn--primary" id="rm-open">Open Report ↗</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/dashboard-common.js"></script>
  <!-- Reports manifest — sets window.CAPS_REPORTS_MANIFEST. Loaded via <script>
       so it works under file:// (no CORS) as well as on GitHub Pages. -->
  <script src="monthly_reports/manifest.js"></script>
  <script>
    CAPS.renderHeader('RFP Overview');

    /* ── Chart.js Global Defaults ── */
    Chart.register(ChartDataLabels);
    Chart.defaults.font.family = "'Inter', sans-serif";
    Chart.defaults.font.size = 12;
    Chart.defaults.color = '#667085';
    Chart.defaults.plugins.legend.labels.usePointStyle = true;
    Chart.defaults.plugins.legend.labels.pointStyleWidth = 10;
    /* Default datalabels off — enable per chart */
    Chart.defaults.plugins.datalabels = { display: false };

    const COLORS = {
      navy: '#1B2F5E', blue: '#2D60C4', crimson: '#BE123C', lightBlue: '#5B8FD6',
      green: '#059669', red: '#DC2626', yellow: '#D97706', orange: '#C05621',
      purple: '#6D28D9', teal: '#0891B2', gray: '#98A2B3',
      navyAlpha: 'rgba(27,47,94,0.85)', blueAlpha: 'rgba(45,96,196,0.85)',
      crimsonAlpha: 'rgba(190,18,60,0.85)', greenAlpha: 'rgba(5,150,105,0.85)',
      orangeAlpha: 'rgba(192,86,33,0.85)', yellowAlpha: 'rgba(217,119,6,0.85)',
    };

    const STAGE_COLORS = {
      'Submitted': COLORS.blue, 'Interview': COLORS.yellow, 'Intent to Award': COLORS.orange,
      'Closed Won': COLORS.green, 'Closed Lost': COLORS.red, 'Terminated': COLORS.purple,
      'RFx Cancelled': COLORS.gray,
    };

    let allCharts = [];
    function destroyCharts() { allCharts.forEach(c => c.destroy()); allCharts = []; }

    /* Intent table sort state (module-level so it survives filter re-renders) */
    let intentSort    = 'date';
    let intentSortDir = 'desc';

    /* ── Helper: get submission month (when proposal was submitted) ── */
    /* Uses UTC methods to avoid timezone shift — e.g. midnight UTC Oct 1 must
       not appear as September in a US timezone browser. */
    function getSubMonth(d) {
      const dt = d.submissionDate || d.bidClosingDate || d.createdDate;
      if (!dt) return null;
      const date = dt instanceof Date ? dt : new Date(dt);
      if (isNaN(date.getTime())) return null;
      return date.getUTCFullYear() + '-' + String(date.getUTCMonth() + 1).padStart(2, '0');
    }

    function monthLabel(ym) {
      const [y, m] = ym.split('-');
      const months = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return months[parseInt(m)] + ' ' + y;
    }

    /* ── Main render ── */
    async function renderDashboard(categoryFilter, yearFilter) {
      const allData = await CAPS.loadData();
      destroyCharts();

      /* Base pool: submission date Oct 2025+ (submission date is the primary date throughout) */
      const OCT_2025_FOR_YEARS = new Date('2025-10-01');
      const yearSet = new Set();
      allData.forEach(d => {
        const ref = d.submissionDate || d.bidClosingDate;
        if (!ref) return;
        const dt = ref instanceof Date ? ref : new Date(ref);
        if (dt >= OCT_2025_FOR_YEARS) { const y = dt.getUTCFullYear(); if (!isNaN(y)) yearSet.add(y); }
      });
      const allYears = [...yearSet].sort((a,b) => b - a);

      /* Apply filters — base set is always submission date Oct 2025+ */
      let baseData = allData.filter(d => {
        const ref = d.submissionDate || d.bidClosingDate;
        return ref && (ref instanceof Date ? ref : new Date(ref)) >= OCT_2025_FOR_YEARS;
      });
      if (yearFilter) {
        baseData = baseData.filter(d => {
          const ref = d.submissionDate || d.bidClosingDate || d.createdDate;
          return ref && new Date(ref).getUTCFullYear() == yearFilter;
        });
      }
      /* Category filter applied last; baseData used for category dropdown options */
      let data = categoryFilter
        ? baseData.filter(d => d.serviceCategory && d.serviceCategory.includes(categoryFilter))
        : baseData;

      const container = document.getElementById('dashboard');
      /* All KPIs are scoped to submission date >= Oct 2025 to match the monthly chart */
      const submissionCutoff = yearFilter ? String(yearFilter) + '-01' : '2025-10';
      const subData = data.filter(d => { const m = getSubMonth(d); return m && m >= submissionCutoff; });
      const totalBySubmission = subData.length;
      const withAmount = subData.filter(d => d.amount !== null);
      const totalValue = withAmount.reduce((s, d) => s + d.amount, 0);
      const submittedCount    = subData.filter(d => d.stage === 'Submitted').length;
      const inInterviewCount  = subData.filter(d => d.stage === 'Interview').length;
      const resultsAwaitingCount = submittedCount + inInterviewCount;
      const interviewCount    = subData.filter(d => d.interviewFlag === 'Yes').length;
      const wonCount          = subData.filter(d => d.stage === 'Closed Won' || d.stage === 'Intent to Award').length;
      const lostCount         = subData.filter(d => d.stage === 'Closed Lost').length;
      const winRate = (wonCount + lostCount) > 0 ? wonCount / (wonCount + lostCount) : 0;
      const awardedCount      = subData.filter(d => d.stage === 'Closed Won' || d.stage === 'Intent to Award').length;

      /* Compute categories from year-filtered base (before category filter) */
      const allCats = {};
      baseData.forEach(d => {
        if (d.serviceCategory) d.serviceCategory.split(';').forEach(c => {
          c = c.trim(); if (c) allCats[c] = (allCats[c] || 0) + 1;
        });
      });
      const catOptions = CAPS.sortedEntries(allCats);

      /* Monthly data — all by submission date */
      const monthSet = new Set();
      subData.forEach(d => { const m = getSubMonth(d); if (m) monthSet.add(m); });
      const months = [...monthSet].sort().filter(m => m >= submissionCutoff);

      const monthSubmissions = {}, monthInterviews = {}, monthBAFO = {}, monthWon = {}, monthLost = {};
      months.forEach(m => { monthSubmissions[m]=0; monthInterviews[m]=0; monthBAFO[m]=0; monthWon[m]=0; monthLost[m]=0; });

      subData.forEach(d => {
        const m = getSubMonth(d);
        if (!m || m < submissionCutoff) return;
        if (!monthSubmissions.hasOwnProperty(m)) return;
        monthSubmissions[m]++;
        if (d.interviewFlag === 'Yes') {
          if (d.interviewSubcategory === 'BAFO') monthBAFO[m]++;
          else monthInterviews[m]++;
        }
        if (d.stage === 'Closed Won') monthWon[m]++;
        if (d.stage === 'Closed Lost') monthLost[m]++;
      });

      /* Stage data — submission date filtered */
      const stageCounts = CAPS.countBy(subData, 'stage');
      const stageValues = CAPS.sumBy(subData, 'stage', 'amount');

      /* Intent to Award deals — submission date filtered */
      const intentDeals = subData.filter(d => d.stage === 'Intent to Award').sort((a, b) => (b.intentToAwardDate || 0) - (a.intentToAwardDate || 0));
      const intentCount = intentDeals.length;

      /* Monthly revenue (booked) — sum of amount for ALL deals in Closed Won or Intent to Award
         stage that have an intentToAwardDate in each month bucket.
         Uses BOTH RFP Data (allData) AND Awards sheet (CAPS_AWARDS_DATA) so deals with
         closedate before Oct 2025 (e.g. historical awards) are also captured.
         Not restricted by submission date — we want all confirmed revenue. */
      const monthRevenue = {};
      const monthRevenueDeals = {}; // month → [{name, amount}] for tooltip
      months.forEach(m => { monthRevenue[m] = 0; monthRevenueDeals[m] = []; });

      // Build combined pool: allData + CAPS_AWARDS_DATA, deduplicated by HubSpot ID.
      // CAPS_AWARDS_DATA uses the same column-name format as CAPS_EMBEDDED_DATA,
      // so dashboard-common normalises it identically via loadData's normalizeRow path.
      const _seenIds = new Set(allData.map(d => String(d.hubspotId || '')));
      const awardsNorm = (window.CAPS_AWARDS_DATA || []).map(r => {
        // CAPS_AWARDS_DATA records already use plain column name keys from the Excel sheet.
        // Re-parse them the same way dashboard-common does for CAPS_EMBEDDED_DATA.
        const row = {};
        for (const [k, v] of Object.entries(r)) row[k.trim()] = v;
        const parseD = v => { if (!v) return null; const d = new Date(v); return isNaN(d) ? null : d; };
        const parseN = v => { if (v===''||v===null||v===undefined) return null; const n = parseFloat(String(v).replace(/[,$]/g,'')); return isNaN(n)?null:n; };
        return {
          hubspotId:        row['HubSpot ID'] || '',
          dealName:         row['Deal Name'] || '',
          stage:            row['Stage'] || '',
          amount:           parseN(row['Amount ($)']),
          intentToAwardDate: parseD(row['Intent to Award Date']),
          submissionDate:   parseD(row['Submission Date']),
        };
      }).filter(d => {
        if (!d.hubspotId || _seenIds.has(String(d.hubspotId))) return false;
        _seenIds.add(String(d.hubspotId));
        return true;
      });
      const revenuePool = [...allData, ...awardsNorm];

      revenuePool.forEach(d => {
        if (!d.intentToAwardDate || !d.amount) return;
        if (d.stage !== 'Closed Won' && d.stage !== 'Intent to Award') return;
        const dt = d.intentToAwardDate instanceof Date ? d.intentToAwardDate : new Date(d.intentToAwardDate);
        if (isNaN(dt.getTime())) return;
        const m = dt.getUTCFullYear() + '-' + String(dt.getUTCMonth() + 1).padStart(2, '0');
        if (!monthRevenue.hasOwnProperty(m)) return;
        monthRevenue[m] += d.amount;
        monthRevenueDeals[m].push({ name: d.dealName || '(Unknown)', amount: d.amount });
      });
      const totalRevenue = Object.values(monthRevenue).reduce((s, v) => s + v, 0);

      /* ═══ BUILD HTML ═══ */
      container.innerHTML = `
        <div class="ca-page-header">
          <div class="ca-page-header__text">
            <h1 class="ca-page-header__title">RFP Overview Dashboard</h1>
            <p class="ca-page-header__subtitle">Submissions, interviews, and awards — <strong>October 2025</strong> to present</p>
          </div>
          <button type="button" class="cta-reports" id="open-reports-btn" title="View team monthly &amp; quarterly reports">
            <span class="cta-reports__icon">📑</span>
            <span>View Team Reports</span>
            <span class="cta-reports__arrow">→</span>
          </button>
        </div>

        <!-- Global Filter -->
        <div class="ca-global-filter">
          <span class="ca-global-filter__label">Year:</span>
          <select id="global-year-filter">
            <option value="">All Years</option>
            ${allYears.map(y => `<option value="${y}" ${yearFilter == y ? 'selected' : ''}>${y}</option>`).join('')}
          </select>
          <span class="ca-global-filter__label" style="margin-left:12px">Category:</span>
          <select id="global-cat-filter">
            <option value="">All Categories</option>
            ${catOptions.map(([c, n]) => `<option value="${c}" ${categoryFilter === c ? 'selected' : ''}>${c} (${n})</option>`).join('')}
          </select>
          <span class="ca-global-filter__count">Showing <strong>${totalBySubmission}</strong> of ${baseData.filter(d => { const m = getSubMonth(d); return m && m >= submissionCutoff; }).length} RFPs (by submission date, Oct 2025+)</span>
        </div>

        <!-- KPI Cards -->
        <div class="ca-metrics-row">
          ${CAPS.metricCard('Total Submissions', CAPS.formatNumber(totalBySubmission), `${CAPS.formatNumber(withAmount.length)} with amount data`, '',
            'Total number of RFPs with a submission date from October 2025 onwards. Matches the monthly chart totals.')}
          ${CAPS.metricCard('Results Awaiting', CAPS.formatNumber(resultsAwaitingCount), `${submittedCount} submitted · ${inInterviewCount} in interview`, 'blue',
            'Number of bids currently awaiting a result — deals still in Submitted or Interview stage in HubSpot.')}

      /* ═══ INTENT TO AWARD TABLE ═══ */
      function iSA(col) {
        const on = intentSort === col;
        return `<span class="sort-arrows"><span class="arr${on&&intentSortDir==='asc'?' on':''}">▲</span><span class="arr${on&&intentSortDir==='desc'?' on':''}">▼</span></span>`;
      }
      function buildIntentTable(deals) {
        if (!deals.length) return '<div style="padding:40px;text-align:center;color:var(--ca-gray-500)">No deals currently in Intent to Award stage</div>';
        const _dir = intentSortDir;
        const sorted = [...deals].sort((a, b) => {
          switch (intentSort) {
            case 'name':   return _dir==='asc' ? (a.dealName||'').localeCompare(b.dealName||'') : (b.dealName||'').localeCompare(a.dealName||'');
            case 'agency': return _dir==='asc' ? (a.agency||'').localeCompare(b.agency||'')     : (b.agency||'').localeCompare(a.agency||'');
            case 'amount': { const va=a.amount||0,vb=b.amount||0; if(!va&&vb)return 1; if(va&&!vb)return -1; return _dir==='desc'?vb-va:va-vb; }
            default: { // 'date'
              const va=a.intentToAwardDate?new Date(a.intentToAwardDate).getTime():0;
              const vb=b.intentToAwardDate?new Date(b.intentToAwardDate).getTime():0;
              if(!va&&vb)return 1; if(va&&!vb)return-1; return _dir==='desc'?vb-va:va-vb;
            }
          }
        });
        function sh(col,label,cls='') {
          return `<th class="${cls}${intentSort===col?' sort-active':''} iv-tbl-sort" data-icol="${col}">${label}${iSA(col)}</th>`;
        }
        return `<table class="ca-table">
          <thead><tr>
            <th style="width:32px">#</th>
            ${sh('name','Deal Name')}
            ${sh('agency','Agency')}
            ${sh('amount','Amount','right ')}
            ${sh('date','Intent Date')}
            <th>HubSpot</th>
          </tr></thead>
          <tbody>${sorted.map((d,i) => `<tr>
            <td style="color:var(--ca-gray-400);font-size:0.78rem">${i+1}</td>
            <td>${(d.dealName||'').substring(0,50)}${(d.dealName||'').length>50?'…':''}</td>
            <td>${(d.agency||'—').substring(0,30)}</td>
            <td class="right mono">${CAPS.formatCurrencyFull(d.amount)}</td>
            <td style="font-size:0.82rem;white-space:nowrap">${CAPS.formatDate(d.intentToAwardDate)}</td>
            <td>${d.hubspotLink?`<a href="${d.hubspotLink}" target="_blank" style="color:var(--ca-blue);text-decoration:none;font-weight:600">View ↗</a>`:'—'}</td>
          </tr>`).join('')}</tbody>
        </table>`;
      }
      function renderIntentTable() {
        document.getElementById('intent-table').innerHTML = buildIntentTable(intentDeals);
        document.querySelectorAll('#intent-table th[data-icol]').forEach(th => {
          th.addEventListener('click', () => {

            if (intentSort === col) intentSortDir = intentSortDir==='desc'?'asc':'desc';

            renderIntentTable();

    /* ─────────── Reports modal: load manifest, populate dropdowns, open PDF ─────────── */
    (function setupReportsModal() {
      const modal = document.getElementById('reports-modal');
      // Note: #open-reports-btn lives inside #dashboard which is rebuilt async by
      // renderDashboard. We use document-level event delegation so the binding
      // survives re-renders and works even before the button exists.
      const typeSel = document.getElementById('rm-type');
      const yearSel = document.getElementById('rm-year');
      const periodSel = document.getElementById('rm-period');
      const periodLabel = document.getElementById('rm-period-label');
      const teamSel = document.getElementById('rm-team');
      const openBtnAct = document.getElementById('rm-open');
      const errBox = document.getElementById('rm-error');
      let manifest = null;

      const monthNames = ['January','February','March','April','May','June',
                          'July','August','September','October','November','December'];

      function showError(msg) {
        errBox.textContent = msg;
        errBox.classList.toggle('is-shown', !!msg);
      }

      function teamFromFilename(fn) {
        // Filenames look like: Team_Alpha_Apr_2026.pdf or Company_Summary_Q1_2026.pdf
        // Strip everything after the period tag (e.g. _Apr_ or _Q1_)
        const stem = fn.replace(/\.pdf$/i, '');
        return stem.replace(/_(?:Q[1-4]|Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)_\d{4}$/i, '')
                   .replace(/_/g, ' ');
      }

      function populateYears() {
        const kind = typeSel.value;
        const buckets = manifest[kind] || {};
        const years = Object.keys(buckets).sort((a,b) => Number(b) - Number(a));
        yearSel.innerHTML = years.length
          ? years.map(y => `<option value="${y}">${y}</option>`).join('')
          : `<option value="">No reports yet</option>`;
        yearSel.disabled = years.length === 0;
        populatePeriods();
      }

      function populatePeriods() {
        const kind = typeSel.value;
        const yr = yearSel.value;
        const buckets = (manifest[kind] || {})[yr] || {};
        // Sort descending by `sort` field — newest first
        const periods = Object.entries(buckets)
          .sort((a, b) => (b[1].sort || 0) - (a[1].sort || 0));
        periodLabel.textContent = kind === 'quarterly' ? 'Quarter' : 'Month';
        periodSel.innerHTML = periods.length
          ? periods.map(([key, info]) =>
              `<option value="${key}">${info.label}</option>`).join('')
          : `<option value="">No periods generated</option>`;
        periodSel.disabled = periods.length === 0;
        populateTeams();
      }

      function populateTeams() {
        const kind = typeSel.value;
        const yr = yearSel.value;
        const periodKey = periodSel.value;
        const info = (((manifest[kind] || {})[yr]) || {})[periodKey];
        const files = (info && info.files) || [];
        const teams = files.map(fn => ({ filename: fn, team: teamFromFilename(fn) }));
        teamSel.innerHTML = teams.length
          ? teams.map(t => `<option value="${t.filename}">${t.team}</option>`).join('')
          : `<option value="">No reports for this period</option>`;
        teamSel.disabled = teams.length === 0;
        openBtnAct.disabled = teams.length === 0;
      }

      function openReport() {
        showError('');
        const periodKey = periodSel.value;
        const filename  = teamSel.value;
        if (!periodKey || !filename) {
          showError('Select a period and team to continue.'); return;
        }
        const url = `monthly_reports/${encodeURIComponent(periodKey)}/${encodeURIComponent(filename)}`;
        // Open in a new tab via a synthetic anchor click. This is the most
        // reliable approach — no popup-blocker quirks, never navigates the
        // current page.
        const a = document.createElement('a');
        a.href = url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        closeModal();
      }

      async function loadManifest() {
        if (manifest) return manifest;
        // 1) Prefer the global set by monthly_reports/manifest.js (no CORS issues
        //    under file:// — works locally without a server).
        if (window.CAPS_REPORTS_MANIFEST) {
          manifest = window.CAPS_REPORTS_MANIFEST;
          return manifest;
        }
        // 2) Fall back to fetching the JSON (works on real HTTP origins).
        try {
          const resp = await fetch('monthly_reports/manifest.json', { cache: 'no-store' });
          if (!resp.ok) throw new Error('manifest fetch failed');
          manifest = await resp.json();
          return manifest;
        } catch (e) {
          showError('Could not load report manifest. Make sure monthly_reports/manifest.js exists (run generate_monthly_reports.py).');
          manifest = { monthly: {}, quarterly: {}, teams: [] };
          return manifest;
        }
      }

      async function openModal() {
        showError('');
        await loadManifest();
        populateYears();
        modal.classList.add('is-open');
        modal.setAttribute('aria-hidden', 'false');
      }
      function closeModal() {
        modal.classList.remove('is-open');
        modal.setAttribute('aria-hidden', 'true');
      }

      // Delegated click — works whether the button exists at bind time or not
      document.addEventListener('click', (e) => {
        const t = e.target;
        if (!t) return;
        // Open button (rebuilt by renderDashboard each run)
        if (t.closest && t.closest('#open-reports-btn')) {
          e.preventDefault();
          openModal();
          return;
        }
        // Any close affordance (backdrop, X, Cancel)
        if (t.closest && t.closest('[data-rm-close]')) {
          closeModal();
        }
      });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.classList.contains('is-open')) closeModal();
      });
      typeSel.addEventListener('change', populateYears);
      yearSel.addEventListener('change', populatePeriods);
      periodSel.addEventListener('change', populateTeams);
      openBtnAct.addEventListener('click', openReport);
    })();
  </script>
</body>
</html>
