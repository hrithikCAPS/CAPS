<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top Target States — CAPS Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/dashboard.css">
  <style>
    .chart-container { position: relative; width: 100%; }
    .chart-container.h320 { height: 340px; }
    .chart-container.h380 { height: 400px; }
    .chart-container.h420 { height: 440px; }

    .ca-section-label {
      font-size: 1.1rem; font-weight: 700; color: var(--ca-navy);
      margin: 28px 0 14px; padding-bottom: 8px; border-bottom: 2px solid var(--ca-light-blue);
    }

    /* Filter bar */
    .ca-global-filter {
      display: flex; align-items: center; gap: 12px;
      background: var(--ca-white); border: 1px solid var(--ca-gray-200);
      border-radius: var(--radius-lg); padding: 14px 20px;
      margin-bottom: 20px; box-shadow: var(--shadow-sm); flex-wrap: wrap;
    }
    .ca-global-filter__label { font-size: 0.9rem; font-weight: 600; color: var(--ca-gray-700); }
    .ca-global-filter select {
      padding: 8px 14px; border: 1px solid var(--ca-gray-300); border-radius: var(--radius-sm);
      font-family: var(--font-family); font-size: 0.88rem; color: var(--ca-gray-700);
      background: var(--ca-white); cursor: pointer; min-width: 180px;
    }
    .ca-global-filter select:focus { border-color: var(--ca-blue); box-shadow: 0 0 0 3px rgba(46,80,144,0.12); outline: none; }
    .ca-global-filter__count { font-size: 0.82rem; color: var(--ca-gray-500); margin-left: auto; }
    .ca-global-filter__count strong { color: var(--ca-blue); font-weight: 700; }

    /* State region map — on-brand blue palette sampled from the same #DBEAFE → #1B2F5E
       gradient used by awards.html and state-analysis.html US maps, so all maps feel consistent. */
    .ca-map-svg { width: 100%; height: auto; display: block; }
    .ca-map-county { stroke: #fff; stroke-width: 0.4; cursor: pointer; transition: opacity 0.15s; }
    .ca-map-county:hover { opacity: 0.82; stroke: var(--ca-navy); stroke-width: 1.2; }
    .ca-map-county.r-1     { fill: #1B2F5E; }   /* navy         (primary region)   */
    .ca-map-county.r-2     { fill: #4472CA; }   /* medium blue  (secondary region) */
    .ca-map-county.r-3     { fill: #93B4E4; }   /* light blue   (tertiary region)  */
    .ca-map-county.r-other { fill: #E4E7EC; }
    .ca-map-county.dim     { fill-opacity: 0.25; pointer-events: none; }

    .map-legend {
      display: flex; justify-content: center; gap: 20px;
      padding: 6px 0 2px; flex-wrap: wrap;
    }
    .map-legend__item { display: flex; align-items: center; gap: 7px; font-size: 0.82rem; color: var(--ca-gray-700); font-weight: 500; }
    .map-legend__sw  { width: 14px; height: 14px; border-radius: 3px; display: inline-block; }
    .map-legend__sw.r-1 { background: #1B2F5E; }
    .map-legend__sw.r-2 { background: #4472CA; }
    .map-legend__sw.r-3 { background: #93B4E4; }

    #map-tooltip {
      position: fixed; pointer-events: none; display: none;
      background: var(--ca-navy); color: #fff;
      padding: 10px 14px; border-radius: 8px; font-size: 0.82rem;
      font-family: var(--font-family); line-height: 1.55;
      box-shadow: var(--shadow-lg); z-index: 9999; max-width: 300px;
    }
    #map-tooltip strong { display: block; font-weight: 700; font-size: 0.92rem; margin-bottom: 4px; }
    #map-tooltip .tt-row { display: grid; grid-template-columns: 1fr 1fr; gap: 2px 14px; font-size: 0.78rem; }
    #map-tooltip .tt-row span.lbl { opacity: 0.65; }

    /* Region scorecards */
    .region-row {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 8px;
    }
    @media (max-width: 1024px) { .region-row { grid-template-columns: 1fr; } }
    .region-card {
      position: relative;
      background: var(--ca-white); border: 1px solid var(--ca-gray-200);
      border-radius: var(--radius-lg); padding: 20px 22px 18px;
      box-shadow: var(--shadow-sm); overflow: hidden; cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .region-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .region-card.active { outline: 2px solid var(--ca-blue); outline-offset: -2px; }
    .region-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }
    .region-card.r-1::before { background: linear-gradient(90deg,#1B2F5E,#4472CA); }
    .region-card.r-2::before { background: linear-gradient(90deg,#4472CA,#6B93E6); }
    .region-card.r-3::before { background: linear-gradient(90deg,#93B4E4,#C7D7EF); }

    .region-card__head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .region-card__title { font-size: 1.08rem; font-weight: 700; color: var(--ca-navy); display: flex; align-items: center; gap: 8px; }
    .region-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .r-1 .region-dot { background: #1B2F5E; }
    .r-2 .region-dot { background: #4472CA; }
    .r-3 .region-dot { background: #93B4E4; }
    .region-card__pill {
      font-size: 0.72rem; font-weight: 600; padding: 3px 10px; border-radius: 12px;
      background: var(--ca-gray-100); color: var(--ca-gray-700);
    }
    .region-card__grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px 14px; margin-bottom: 14px; }
    .region-stat__lbl { font-size: 0.66rem; font-weight: 600; color: var(--ca-gray-500); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
    .region-stat__val { font-size: 1.2rem; font-weight: 700; color: var(--ca-gray-900); line-height: 1.1; }
    .region-stat__val.won  { color: var(--ca-green); }
    .region-stat__val.lost { color: var(--ca-red); }
    .region-stat__val.ia   { color: var(--ca-orange); }
    .region-stat__val.iv   { color: var(--ca-blue); }
    .region-stat__sub { font-size: 0.7rem; color: var(--ca-gray-500); margin-top: 2px; }

    .region-winrate {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; background: var(--ca-gray-50);
      border-radius: var(--radius-sm); border: 1px solid var(--ca-gray-100);
    }
    .region-winrate__lbl { font-size: 0.74rem; font-weight: 600; color: var(--ca-gray-500); text-transform: uppercase; letter-spacing: 0.05em; min-width: 70px; }
    .region-winrate__bar { flex: 1; height: 8px; background: var(--ca-gray-200); border-radius: 4px; overflow: hidden; }
    .region-winrate__fill { height: 100%; border-radius: 4px; }
    .region-winrate__fill.good  { background: var(--ca-green); }
    .region-winrate__fill.amber { background: var(--ca-yellow); }
    .region-winrate__fill.red   { background: var(--ca-red); }
    .region-winrate__fill.none  { background: var(--ca-gray-300); }
    .region-winrate__pct { font-size: 0.95rem; font-weight: 700; min-width: 52px; text-align: right; }
    .region-winrate__pct.good  { color: var(--ca-green); }
    .region-winrate__pct.amber { color: var(--ca-yellow); }
    .region-winrate__pct.red   { color: var(--ca-red); }
    .region-winrate__pct.none  { color: var(--ca-gray-400); }

    /* Insights callouts */
    .insights-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin: 6px 0 24px; }
    @media (max-width: 1024px) { .insights-row { grid-template-columns: 1fr; } }
    .insight {
      background: var(--ca-white); border: 1px solid var(--ca-gray-200);
      border-left: 4px solid var(--ca-blue);
      border-radius: var(--radius-sm); padding: 14px 16px;
      box-shadow: var(--shadow-sm);
    }
    .insight.good { border-left-color: var(--ca-green); }
    .insight.warn { border-left-color: var(--ca-yellow); }
    .insight.bad  { border-left-color: var(--ca-red); }
    .insight__kicker { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--ca-gray-500); margin-bottom: 4px; }
    .insight__title { font-size: 0.98rem; font-weight: 700; color: var(--ca-gray-900); margin-bottom: 3px; }
    .insight__body { font-size: 0.82rem; color: var(--ca-gray-700); line-height: 1.5; }

    /* Heatmap */
    .heatmap-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .heatmap-table thead th {
      background: var(--ca-gray-50); color: var(--ca-gray-500); font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.04em; font-size: 0.7rem;
      padding: 10px 12px; text-align: center; border-bottom: 1px solid var(--ca-gray-200);
      white-space: nowrap;
    }
    .heatmap-table thead th.left-col { text-align: left; }
    .heatmap-table tbody td { padding: 8px 12px; vertical-align: middle; border-bottom: 1px solid var(--ca-gray-100); text-align: center; }
    .heatmap-table tbody td.category-cell { text-align: left; font-weight: 600; color: var(--ca-gray-700); }
    .heatmap-table .hm-cell { display: inline-block; min-width: 60px; padding: 3px 10px; border-radius: 6px; font-weight: 700; font-size: 0.82rem; }
    .heatmap-table .hm-cell.empty { color: var(--ca-gray-300); background: transparent; font-weight: 400; }
    .hm-cell__sub { display: block; font-size: 0.66rem; font-weight: 500; opacity: 0.75; margin-top: 1px; }

    /* Awards table */
    .ca-table-scroll { overflow-x: auto; }
    .aw-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    .aw-table thead th {
      background: var(--ca-gray-50); color: var(--ca-gray-500); font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.04em; font-size: 0.7rem;
      padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--ca-gray-200);
      white-space: nowrap; cursor: pointer; user-select: none;
    }
    .aw-table thead th.right { text-align: right; }
    .aw-table thead th:hover { background: var(--ca-gray-100); color: var(--ca-gray-700); }
    .aw-table thead th.sort-active { color: var(--ca-blue); background: rgba(46,80,144,0.06); }
    .sort-arrows { display: inline-flex; flex-direction: column; margin-left: 4px; gap: 1px; vertical-align: middle; }
    .sort-arrows .arr { font-size: 0.58rem; opacity: 0.3; line-height: 1; }
    .sort-arrows .arr.on { opacity: 1; color: var(--ca-blue); }
    .aw-table tbody tr { border-bottom: 1px solid var(--ca-gray-100); transition: background 0.12s; }
    .aw-table tbody tr:hover { background: var(--ca-gray-50); }
    .aw-table tbody td { padding: 10px 14px; color: var(--ca-gray-700); vertical-align: middle; }
    .aw-table tbody td.right { text-align: right; font-family: 'SF Mono','Fira Code',monospace; font-size: 0.82rem; }
    .aw-link { color: var(--ca-blue); font-weight: 600; text-decoration: none; }
    .aw-link:hover { text-decoration: underline; }

    .region-chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 2px 10px; border-radius: 12px; font-size: 0.74rem; font-weight: 600;
    }
    .region-chip::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
    .region-chip.r-1 { background: #E0E7F1; color: #1B2F5E; }
    .region-chip.r-1::before { background: #1B2F5E; }
    .region-chip.r-2 { background: #DBEAFE; color: #1E40AF; }
    .region-chip.r-2::before { background: #4472CA; }
    .region-chip.r-3 { background: #EFF4FC; color: #2D4A8C; }
    .region-chip.r-3::before { background: #93B4E4; }
    .region-chip.none { background: var(--ca-gray-100); color: var(--ca-gray-500); }
    .region-chip.none::before { background: var(--ca-gray-300); }

    /* Search row */
    .ca-controls-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; padding: 0 4px; }
    .ca-search-wrap { position: relative; display: flex; align-items: center; }
    .ca-search-wrap svg { position: absolute; left: 10px; color: var(--ca-gray-400); pointer-events: none; }
    .ca-search-input {
      padding: 7px 12px 7px 34px; border: 1px solid var(--ca-gray-300); border-radius: var(--radius-sm);
      font-family: var(--font-family); font-size: 0.875rem; color: var(--ca-gray-700);
      background: var(--ca-white); outline: none; min-width: 260px; transition: border-color 0.15s;
    }
    .ca-search-input:focus { border-color: var(--ca-blue); box-shadow: 0 0 0 3px rgba(46,80,144,0.1); }
    .ca-search-clear { position: absolute; right: 8px; background: none; border: none; cursor: pointer; color: var(--ca-gray-400); font-size: 1rem; line-height: 1; padding: 0 2px; display: none; }
    .ca-count-chip { font-size: 0.82rem; color: var(--ca-gray-500); }
    .ca-count-chip strong { color: var(--ca-blue); font-weight: 700; }

    .ca-mapgrid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 20px; margin-bottom: 10px; }
    @media (max-width: 1100px) { .ca-mapgrid { grid-template-columns: 1fr; } }

    .method-note {
      background: #F8FAFC; border: 1px dashed var(--ca-gray-300); border-radius: var(--radius-sm);
      padding: 10px 14px; font-size: 0.78rem; color: var(--ca-gray-500);
      margin-bottom: 18px; line-height: 1.55;
    }
    .method-note strong { color: var(--ca-gray-700); }

    /* "Coming soon" placeholder for non-California states */
    .coming-soon {
      background: linear-gradient(135deg, #F8FAFC 0%, #EEF2FF 100%);
      border: 1px dashed var(--ca-gray-300);
      border-radius: var(--radius-lg);
      padding: 32px 28px; text-align: center;
      margin-bottom: 24px;
    }
    .coming-soon__icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 52px; height: 52px; border-radius: 12px;
      background: var(--ca-white); box-shadow: var(--shadow-sm);
      font-size: 1.6rem; margin-bottom: 14px;
    }
    .coming-soon__title { font-size: 1.1rem; font-weight: 700; color: var(--ca-navy); margin-bottom: 4px; }
    .coming-soon__body { font-size: 0.88rem; color: var(--ca-gray-500); line-height: 1.55; max-width: 540px; margin: 0 auto; }
    .coming-soon__pill { display: inline-block; margin-top: 12px; padding: 4px 12px; background: var(--ca-blue); color: #fff; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; border-radius: 12px; }

    /* ═════════ Award pins on state map ═════════ */
    /* Teardrop map-style pins — anchored so the tip sits on the county centroid.
       No positional hover animation — the pin stays put so it's easy to read and click.
       The hovered pin is highlighted via stroke width + a deeper shadow instead. */
    .award-pin-g { cursor: pointer; }
    .award-pin-body {
      stroke: #fff; stroke-width: 1.6; stroke-linejoin: round;
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.28));
      transition: stroke-width 0.12s ease, filter 0.12s ease;
    }
    .award-pin-body.won { fill: #059669; }
    .award-pin-body.ia  { fill: #F59E0B; }
    .award-pin-g:hover .award-pin-body {
      stroke-width: 2.4;
      filter: drop-shadow(0 3px 5px rgba(0,0,0,0.42));
    }
    .award-pin-dot { fill: #fff; pointer-events: none; }
    .award-pin-shadow { fill: rgba(15,23,42,0.22); pointer-events: none; }

    .pin-legend {
      display: inline-flex; align-items: center; gap: 14px;
      font-size: 0.78rem; color: var(--ca-gray-600);
      margin-left: auto; flex-wrap: wrap;
    }
    .pin-legend__item { display: inline-flex; align-items: center; gap: 6px; }
    .pin-legend__mark {
      display: inline-block; width: 12px; height: 16px; position: relative;
    }
    .pin-legend__mark::before {
      content:''; position:absolute; left:50%; top:0; width:12px; height:12px;
      border-radius:50% 50% 50% 0; transform: translateX(-50%) rotate(-45deg);
      border: 1.5px solid #fff; box-shadow: 0 1px 2px rgba(0,0,0,0.25);
    }
    .pin-legend__mark.won::before { background: #059669; }
    .pin-legend__mark.ia::before  { background: #F59E0B; }

    /* ═════════ Top States Table ═════════ */
    .top-states-table {
      width: 100%; border-collapse: collapse; font-size: 0.88rem;
      font-family: 'Inter', sans-serif;
    }
    .top-states-table thead th {
      background: #F8FAFC; color: var(--ca-navy); font-weight: 700;
      text-align: left; padding: 10px 14px;
      border-bottom: 2px solid var(--ca-gray-200);
      font-size: 0.76rem; text-transform: uppercase; letter-spacing: 0.04em;
      cursor: pointer; user-select: none; white-space: nowrap;
      position: sticky; top: 0; z-index: 2;
    }
    .top-states-table thead th:hover { background: #EEF2F6; }
    .top-states-table thead th .sort-arrow {
      display: inline-block; margin-left: 5px; font-size: 0.72rem;
      color: var(--ca-gray-400); transition: color 0.12s;
    }
    .top-states-table thead th.is-sorted .sort-arrow { color: var(--ca-navy); }
    .top-states-table thead th.num { text-align: right; }
    .top-states-table .filter-row th {
      background: #fff; padding: 6px 10px; border-bottom: 1px solid var(--ca-gray-200);
      cursor: default; text-transform: none; letter-spacing: 0; font-weight: 400;
      position: sticky; top: 38px; z-index: 2;
    }
    .top-states-table .filter-row th:hover { background: #fff; }
    .top-states-table .col-filter {
      width: 100%; padding: 5px 8px; border: 1px solid var(--ca-gray-200);
      border-radius: 6px; font-size: 0.78rem; font-family: inherit;
      color: var(--ca-gray-700); background: #fff; outline: none;
      transition: border-color 0.12s, box-shadow 0.12s;
    }
    .top-states-table .col-filter:focus {
      border-color: var(--ca-blue);
      box-shadow: 0 0 0 2px rgba(45,96,196,0.15);
    }
    .top-states-table tbody td {
      padding: 8px 14px; border-bottom: 1px solid var(--ca-gray-100);
      color: var(--ca-gray-700);
    }
    .top-states-table tbody tr { cursor: pointer; }
    .top-states-table tbody tr:hover { background: #F8FAFC; }
    .top-states-table tbody tr.is-target { background: #FFFBEB; }
    .top-states-table tbody tr.is-target:hover { background: #FEF3C7; }
    .top-states-table tbody td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .top-states-table tbody td.state-name { font-weight: 600; color: var(--ca-navy); }
    .top-states-table tbody td .target-star { color: #F59E0B; margin-left: 4px; }
    /* Active (currently-selected) state row — strong highlight, overrides target tint */
    .top-states-table tbody tr.is-active,
    .top-states-table tbody tr.is-active:hover,
    .top-states-table tbody tr.is-active.is-target,
    .top-states-table tbody tr.is-active.is-target:hover {
      background: #DBEAFE;
      box-shadow: inset 4px 0 0 0 var(--ca-navy);
    }
    .top-states-table tbody tr.is-active td.state-name { color: var(--ca-navy); }
    .top-states-table tfoot td {
      padding: 10px 14px; font-weight: 700; color: var(--ca-navy);
      background: #F8FAFC; border-top: 2px solid var(--ca-gray-200);
    }
    .top-states-table tfoot td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .top-states-wrap {
      max-height: 520px; overflow-y: auto; border-radius: 0 0 10px 10px;
    }
    .top-states-empty {
      padding: 30px; text-align: center; color: var(--ca-gray-400); font-size: 0.88rem;
    }
  </style>
</head>
<body>

<div id="map-tooltip"></div>
<main class="ca-main" id="dashboard">
  <div class="ca-loading">
    <div class="ca-loading__spinner"></div>
    <div class="ca-loading__text">Loading target-state data...</div>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<script src="js/data.js"></script>
<script src="js/dashboard-common.js"></script>
<script>
  CAPS.renderHeader('Top Target States');

  Chart.register(ChartDataLabels);
  Chart.defaults.font.family = "'Inter', sans-serif";
  Chart.defaults.font.size   = 12;
  Chart.defaults.color       = '#667085';
  Chart.defaults.plugins.legend.labels.usePointStyle   = true;
  Chart.defaults.plugins.legend.labels.pointStyleWidth = 10;
  Chart.defaults.plugins.datalabels                    = { display: false };

  const COLORS = {
    navy: '#1B2F5E', blue: '#2D60C4', green: '#059669', red: '#DC2626',
    yellow: '#D97706', orange: '#C05621',
    blueAlpha:   'rgba(46,96,196,0.82)',
    greenAlpha:  'rgba(5,150,105,0.82)',
    redAlpha:    'rgba(220,38,38,0.75)',
    orangeAlpha: 'rgba(192,86,33,0.82)',
  };

  /* ═══════════════════════════════════════════════════════════════
     TARGET STATES CONFIG
     Every target state has 3 regions. The page renders the same
     analysis stack (map, scorecards, funnel/pipeline/matrix charts,
     category heatmap, awards table) for each. Region colour slots
     (r-1 navy, r-2 medium blue, r-3 light blue) come from the same
     #DBEAFE → #1B2F5E palette used on awards.html + state-analysis.html,
     so every map on the dashboard feels cohesive.
     ═══════════════════════════════════════════════════════════════ */
  const TARGET_STATES = [
    { key: 'California' },
    { key: 'New York' },
    { key: 'Texas' },

  /* ─────── Build a FIPS→region dict from an explicit per-region list + a default region ─────── */
  function buildCountyMap(stateFips, explicit, defaultRegion) {

    });

  /* Resolve an agency to a specific county feature.
     Returns the TopoJSON feature, or null if no match found. */
  function resolveCountyFeature(state, agency, countyByName) {
    if (!agency || !countyByName) return null;
    const k = agency.toLowerCase();
    const hints = AGENCY_COUNTY_HINTS[state] || [];
    for (const [sub, cname] of hints) {
      if (k.includes(sub)) {
        const f = countyByName[cname];
        if (f) return f;
      }
    }
    // Fallback: agency contains "<county> county" → match directly against the TopoJSON name
    const m = k.match(/([a-z\.' \-]+?)\s+county/);
    if (m) {
      const f = countyByName[m[1].trim()];
      if (f) return f;
    }
    return null;
  }

  /* Classify an agency into one of its state's regions.
     Order: explicit agency-name lookup → county-map default (n/a for agency names) → keyword match. */
  function classifyRegion(state, agency) {
    if (!agency) return null;
    const cfg = STATE_CONFIG[state];
    if (!cfg) return null;
    const k = agency.trim().toLowerCase();
    if (cfg.agencyMap && cfg.agencyMap[k]) return cfg.agencyMap[k];
    for (const region of cfg.regions) {
      const kws = (cfg.keywords || {})[region] || [];
      for (const kw of kws) { if (k.includes(kw)) return region; }
    }
    // Any record whose agency matches none of the keyword lists falls into the state's default ("catch-all") region,
    // which is always the LAST region in the cfg.regions array (matches countyMap.__default by construction).
    return cfg.countyMap.__default || null;
  }

  /* Return palette entry for a region (by index in its state's regions array) */
  function regionPalette(state, region) {
    const cfg = STATE_CONFIG[state];
    if (!cfg) return REGION_PALETTE[0];
    const idx = cfg.regions.indexOf(region);
    return REGION_PALETTE[idx >= 0 ? idx : 0];
  }

  /* ── Page state ── */
  let activeState        = 'California';   // CA / NY / TX / FL
  let activeYearFilter   = '';
  let activeRegionFilter = '';             // drill-down inside CA only
  let activeSearch       = '';
  let activeSort         = 'amount';
  let activeSortDir      = 'desc';

  let chPipeline = null;

  /* ══════════════════════════════════════════════════════════════ */
  async function renderDashboard() {
    const allData = await CAPS.loadData();
    const OCT_2025 = new Date('2025-10-01');

    /* Year options (across entire target-state universe, Oct 2025+) */
    const yearSet = new Set();
    allData.forEach(d => {
      const ref = d.bidClosingDate || d.submissionDate;
      if (!ref) return;
      const dt = ref instanceof Date ? ref : new Date(ref);
      if (dt >= OCT_2025) yearSet.add(dt.getFullYear());
    });
    const allYears = [...yearSet].sort((a,b) => b - a);

    /* Bids per state — counts for both the target-state pill tabs AND
       for every other state (so the state dropdown lists the whole universe).
       State names are normalised via normStateName so typos (TEXAS, Missourie,
       Washington DC, CA, etc.) collapse into a single canonical entry. */
    const stateCounts = {};
    TARGET_STATES.forEach(s => stateCounts[s.key] = 0);
    const allStateCounts = {};
    allData.forEach(d => {
      const ref = d.bidClosingDate || d.submissionDate;
      if (!ref) return;
      const dt = ref instanceof Date ? ref : new Date(ref);
      if (dt < OCT_2025) return;
      const raw = (d.agencyState || '').trim();
      if (!raw) return;
      const st = normStateName(raw) || raw;
      if (stateCounts.hasOwnProperty(st)) stateCounts[st]++;
      allStateCounts[st] = (allStateCounts[st] || 0) + 1;
    });
    // Sorted list of all states with bids, target states first then the rest by count desc.
    const targetKeys = TARGET_STATES.map(s => s.key);
    const otherStates = Object.keys(allStateCounts)
      .filter(s => !targetKeys.includes(s))
      .sort((a, b) => allStateCounts[b] - allStateCounts[a] || a.localeCompare(b));

    /* Base = selected state, Oct 2025+, (optionally year-filtered).
       Normalise agencyState so typos/variants (TEXAS, CA, Missourie, Washington DC)
       still match the canonical activeState name. */
    let base = allData.filter(d => {
      const ref = d.bidClosingDate || d.submissionDate;
      if (!ref) return false;
      const dt = ref instanceof Date ? ref : new Date(ref);
      if (dt < OCT_2025) return false;
      const raw = (d.agencyState || '').trim();
      const st = normStateName(raw) || raw;
      return st === activeState;
    });
    if (activeYearFilter) {
      base = base.filter(d => {
        const ref = d.bidClosingDate || d.submissionDate;
        return ref && new Date(ref).getFullYear() == activeYearFilter;
      });
    }

    const hasRegions = !!STATE_CONFIG[activeState];           // only target states have regional breakdowns
    const stateCfg = STATE_CONFIG[activeState] || STATE_CONFIG['California'];
    const REGIONS  = hasRegions ? stateCfg.regions : [];       // empty for non-target states

    /* Tag every record with its region (state-aware classifier) */
    const tagged = base.map(d => ({
      ...d,
      _region: classifyRegion(activeState, d.agency)
    }));
    const unclassified = tagged.filter(d => !d._region || !REGIONS.includes(d._region)).length;

    /* Apply region drill-down */
    const data = activeRegionFilter
      ? tagged.filter(d => d._region === activeRegionFilter)
      : tagged;

    /* Aggregate per region */
    function emptyAgg() {
      return { bids:0, won:0, lost:0, iv:0, ia:0, submitted:0, terminated:0, cancelled:0,
               value:0, activeValue:0, wonAmounts: [], agencies:new Set() };
    }
    const regAgg = {};
    REGIONS.forEach(r => { regAgg[r] = emptyAgg(); });
    regAgg['Unclassified'] = emptyAgg();
    if (hasRegions) {
      tagged.forEach(d => {
        const r = (d._region && regAgg[d._region]) ? d._region : 'Unclassified';
        const a = regAgg[r];
        a.bids++;
        if (d.interviewFlag === 'Yes')       a.iv++;
        if (d.stage === 'Intent to Award')   a.ia++;
        if (d.stage === 'Closed Won')        { a.won++; a.value += d.amount || 0; if (d.amount) a.wonAmounts.push(d.amount); }
        if (d.stage === 'Closed Lost')       a.lost++;
        if (d.stage === 'Submitted')         a.submitted++;
        if (d.stage === 'Terminated')        a.terminated++;
        if (d.stage === 'RFx Cancelled')     a.cancelled++;
        if (['Submitted','Interview','Intent to Award'].includes(d.stage)) a.activeValue += d.amount || 0;
        if (d.agency) a.agencies.add(d.agency.trim());
      });
      REGIONS.concat(['Unclassified']).forEach(r => {
        const a = regAgg[r];
        a.decided    = a.won + a.lost;
        a.winRate    = a.decided > 0 ? a.won / a.decided : null;
        a.avgWonAmt  = a.wonAmounts.length > 0 ? a.wonAmounts.reduce((s,v)=>s+v,0)/a.wonAmounts.length : 0;
        a.bidToInterview = a.bids > 0 ? a.iv / a.bids : 0;
        a.interviewToIA  = a.iv   > 0 ? a.ia / a.iv  : 0;
        a.bidToWin       = a.bids > 0 ? a.won / a.bids : 0;
      });
    }

    /* State-level totals (always computed) */
    const stateTotal = data.reduce((acc, d) => {
      acc.bids++;
      if (d.interviewFlag === 'Yes')     acc.iv++;
      if (d.stage === 'Intent to Award') acc.ia++;
      if (d.stage === 'Closed Won')  { acc.won++; acc.value += d.amount || 0; }
      if (d.stage === 'Closed Lost') acc.lost++;
      if (['Submitted','Interview','Intent to Award'].includes(d.stage)) acc.activeValue += d.amount || 0;
      return acc;
    }, { bids:0, won:0, lost:0, iv:0, ia:0, value:0, activeValue:0 });
    stateTotal.decided = stateTotal.won + stateTotal.lost;
    stateTotal.winRate = stateTotal.decided > 0 ? stateTotal.won / stateTotal.decided : 0;

    /* Category × region matrix (CA only) */
    const catRegion = {};
    if (hasRegions) {
      tagged.forEach(d => {
        if (!d._region) return;
        const cats = d.serviceCategory ? d.serviceCategory.split(';').map(c => c.trim()).filter(Boolean) : ['(No Category)'];
        cats.forEach(cat => {
          if (!catRegion[cat]) catRegion[cat] = {};
          if (!catRegion[cat][d._region]) catRegion[cat][d._region] = { bids:0, won:0, lost:0 };
          const c = catRegion[cat][d._region];
          c.bids++;
          if (d.stage === 'Closed Won')  c.won++;
          if (d.stage === 'Closed Lost') c.lost++;
        });
      });
    }

    const insights = hasRegions ? deriveRegionalInsights(activeState, regAgg, REGIONS) : [];
    const awards = data.filter(d => d.stage === 'Closed Won');
    const stateActiveBidCount = allStateCounts[activeState] || 0;

    /* Build dropdown <options> — target states only */
    const stateOptionsHtml = TARGET_STATES.map(s =>
      `<option value="${s.key}" ${activeState === s.key ? 'selected' : ''}>${s.key} (${stateCounts[s.key] || 0})</option>`
    ).join('');

    /* ── BUILD HTML ── */
    document.getElementById('dashboard').innerHTML = `
      <div class="ca-page-header">
        <h1 class="ca-page-header__title">State Analysis</h1>
        <p class="ca-page-header__subtitle">
          Deep-dive into any state where we're bidding — pick a state from the filter below.
          Target states (California, New York, Texas, Florida, Virginia, Oregon, South Carolina) get the full regional breakdown. <strong>October 2025</strong> onwards.
        </p>
      </div>

      <!-- KPIs -->
      <div class="ca-metrics-row">
        ${CAPS.metricCard('Total Bids', CAPS.formatNumber(stateTotal.bids),
          hasRegions && activeRegionFilter ? activeRegionFilter : activeState, '',
          `RFPs submitted in ${activeState} from <strong>October 2025</strong> onwards.`)}
        ${CAPS.metricCard('Active Pipeline', CAPS.formatCurrency(stateTotal.activeValue),
          'Submitted + Interview + IA', 'blue',
          'Sum of deal $ still in flight — potential revenue if we close it.')}
        ${CAPS.metricCard('Intent to Award', CAPS.formatNumber(stateTotal.ia),
          stateTotal.bids > 0 ? CAPS.formatPercent(stateTotal.ia / stateTotal.bids) + ' of bids' : '—',
          'orange', 'Deals at Intent to Award — very high probability of becoming revenue.')}
        ${CAPS.metricCard('Closed Won', CAPS.formatNumber(stateTotal.won),
          stateTotal.value > 0 ? CAPS.formatCurrency(stateTotal.value) : '—',
          'green', `Number of awards + total contract value in ${activeState}.`)}
        ${CAPS.metricCard('Win Rate', CAPS.formatPercent(stateTotal.winRate),
          stateTotal.won + ' won / ' + stateTotal.lost + ' lost', 'blue',
          'Formula: Won / (Won + Lost). Excludes deals still in progress.')}
      </div>

      <!-- Filter bar -->
      <div class="ca-global-filter">
        <span class="ca-global-filter__label">State:</span>
        <select id="gf-state">
          ${stateOptionsHtml}
        </select>
        <span class="ca-global-filter__label" style="margin-left:12px">Year:</span>
        <select id="gf-year">
          <option value="">All Years</option>
          ${allYears.map(y => `<option value="${y}" ${activeYearFilter == y ? 'selected' : ''}>${y}</option>`).join('')}
        </select>
        ${hasRegions ? `
        <span class="ca-global-filter__label" style="margin-left:12px">Region:</span>
        <select id="gf-region">
          <option value="">All ${activeState} Regions</option>
          ${REGIONS.map(r => `<option value="${r}" ${activeRegionFilter === r ? 'selected' : ''}>${r} (${regAgg[r].bids})</option>`).join('')}
        </select>` : ''}
        <span class="ca-global-filter__count">
          Showing <strong>${data.length}</strong> of ${tagged.length} ${activeState} RFPs

      <!-- States by Awards (always visible) -->

  }

  /* ════════════════ Insights ════════════════ */
  function deriveRegionalInsights(state, regAgg, REGIONS) {
    const out = [];
    const rows = REGIONS.map(r => ({ r, ...regAgg[r] }));
    const decided = rows.filter(x => x.decided >= 3);
    if (decided.length > 0) {
      const best = decided.slice().sort((a,b) => (b.winRate||0) - (a.winRate||0))[0];
      out.push({
        tone: 'good',
        kicker: 'Double down',
        title: `${best.r} has the strongest win rate`,
        body: `${(best.winRate*100).toFixed(1)}% win rate (${best.won} won / ${best.lost} lost).
               Avg won deal size: ${CAPS.formatCurrency(best.avgWonAmt)}. Consider prioritising sales & delivery capacity here.`
      });
    } else {
      out.push({
        tone: 'warn',
        kicker: 'Not enough data',
        title: 'Win-rate leaderboard still forming',
        body: 'Most regions have fewer than 3 decided deals. Keep bidding — the picture gets clearer as deals decide.'
      });
    }
    const byBids = rows.slice().sort((a,b) => b.bids - a.bids);
    const topBid = byBids[0];
    const wrStr = topBid.winRate !== null ? (topBid.winRate*100).toFixed(1) + '%' : 'n/a';
    const tone = (topBid.winRate !== null && topBid.winRate < 0.3) ? 'bad'
              : (topBid.winRate !== null && topBid.winRate < 0.5) ? 'warn' : 'good';
    out.push({
      tone,
      kicker: 'Where effort is going',
      title: `${topBid.r}: ${topBid.bids} bids (${Math.round(100*topBid.bids/Math.max(1,rows.reduce((s,x)=>s+x.bids,0)))}% of ${state} effort)`,
      body: `Win rate here is <strong>${wrStr}</strong>. Active pipeline $ = ${CAPS.formatCurrency(topBid.activeValue)}.
             ${tone === 'bad' ? '⚠️ High effort + low conversion — tighten RFP qualification.' :
               tone === 'warn' ? 'Solid volume but win rate is average. Investigate what differentiates won vs lost bids.' :
               'Strong volume and winning. Keep the engine running.'}`
    });
    const byPipeline = rows.slice().sort((a,b) => b.activeValue - a.activeValue);
    const topPipe = byPipeline[0];
    if (topPipe.activeValue > 0) {
      out.push({
        tone: 'good',
        kicker: 'Revenue opportunity',
        title: `${topPipe.r} holds ${CAPS.formatCurrency(topPipe.activeValue)} of active pipeline`,
        body: `${topPipe.submitted + topPipe.iv + topPipe.ia} deals in flight (${topPipe.submitted} submitted, ${topPipe.iv} interview, ${topPipe.ia} IA).
               Prioritise interview prep and IA follow-through to convert this into revenue.`
      });
    } else {
      out.push({
        tone: 'warn',
        kicker: 'Revenue opportunity',
        title: 'Active pipeline $ is thin',
        body: 'Many deals have no amount recorded, or the in-flight dollar value is low. Ensure amounts are logged in HubSpot when bids are submitted.'
      });
    }
    return out;
  }

  /* ════════════════ Region scorecard ════════════════ */
  function regionCardHTML(state, region, a) {
    const pct    = a.winRate !== null ? (a.winRate * 100).toFixed(1) + '%' : '—';
    const wrcls  = a.winRate === null ? 'none' : a.winRate >= 0.6 ? 'good' : a.winRate >= 0.3 ? 'amber' : 'red';
    const barW   = a.winRate !== null ? (a.winRate * 100).toFixed(1) : 0;
    const cls    = regionPalette(state, region).cls;
    const ivRate = a.bids > 0 ? ((a.iv / a.bids) * 100).toFixed(0) : '0';
    const activeClass = (activeRegionFilter === region) ? 'active' : '';

    return `
      <div class="region-card ${cls} ${activeClass}" data-region-card="${region}" title="Click to filter">
        <div class="region-card__head">
          <div class="region-card__title"><span class="region-dot"></span>${region}</div>
          <span class="region-card__pill">${a.agencies.size} agenc${a.agencies.size === 1 ? 'y' : 'ies'}</span>
        </div>
        <div class="region-card__grid">
          <div><div class="region-stat__lbl">Bids</div><div class="region-stat__val">${a.bids}</div></div>
          <div><div class="region-stat__lbl">Interviews</div><div class="region-stat__val iv">${a.iv}</div>
               <div class="region-stat__sub">${ivRate}% of bids</div></div>
          <div><div class="region-stat__lbl">IA</div><div class="region-stat__val ia">${a.ia}</div></div>
          <div><div class="region-stat__lbl">Won</div><div class="region-stat__val won">${a.won}</div>
               <div class="region-stat__sub">${a.value > 0 ? CAPS.formatCurrency(a.value) : '—'}</div></div>
          <div><div class="region-stat__lbl">Lost</div><div class="region-stat__val lost">${a.lost}</div></div>
          <div><div class="region-stat__lbl">Active $</div><div class="region-stat__val">${a.activeValue > 0 ? CAPS.formatCurrency(a.activeValue) : '—'}</div></div>
        </div>
        <div class="region-winrate">
          <span class="region-winrate__lbl">Win Rate</span>
          <div class="region-winrate__bar"><div class="region-winrate__fill ${wrcls}" style="width:${barW}%"></div></div>
          <span class="region-winrate__pct ${wrcls}">${pct}</span>
        </div>
      </div>
    `;
  }

  /* ════════════════ State Map ════════════════
     Renders the selected state at county-level, coloured by
     its 3 regions using the shared on-brand REGION_PALETTE. */
  async function buildStateMap(state, regAgg, REGIONS) {
    const wrap = document.getElementById('map-wrap');
    const legendEl = document.getElementById('map-legend');
    if (!wrap) return;
    wrap.innerHTML = '';

    const stateCfg = STATE_CONFIG[state];
    if (!stateCfg) return;
    const stateFips = stateCfg.stateFips;
    const countyMap = stateCfg.countyMap;

    let us;
    try { us = await d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json'); }
    catch(e) {
      wrap.innerHTML = '<div style="padding:40px;text-align:center;color:var(--ca-gray-400)">Map unavailable — check your connection.</div>';
      return;
    }
    const counties = topojson.feature(us, us.objects.counties).features;
    const stateCounties = counties.filter(f => String(f.id).padStart(5,'0').startsWith(stateFips));

    // Helper: region for a county id (defaults to the state's catch-all region)
    const regionFor = (id) => countyMap[id] || countyMap.__default;

    const W = 560, H = 620;
    const fc = { type: 'FeatureCollection', features: stateCounties };
    const proj = d3.geoMercator().fitSize([W - 20, H - 20], fc);
    const path = d3.geoPath().projection(proj);

    const svg = d3.select('#map-wrap').append('svg')
      .attr('viewBox', `0 0 ${W} ${H}`).attr('class', 'ca-map-svg')
      .style('max-height','620px');

    const tooltip = document.getElementById('map-tooltip');

    svg.selectAll('path.county').data(stateCounties).enter()
      .append('path')
      .attr('class', d => {
        const id = String(d.id).padStart(5,'0');
        const reg = regionFor(id);
        const palette = reg ? regionPalette(state, reg) : null;
        const base = 'ca-map-county ' + (palette ? palette.cls : 'r-other');
        if (activeRegionFilter && reg !== activeRegionFilter) return base + ' dim';
        return base;
      })
      .attr('d', path)
      .on('mousemove', (event, d) => {
        const id = String(d.id).padStart(5,'0');
        const reg = regionFor(id);
        if (!reg || !regAgg[reg]) return;
        const r = regAgg[reg];
        const wr = r.winRate !== null ? (r.winRate*100).toFixed(1) + '%' : '—';
        const countyName = (d.properties && d.properties.name) ? d.properties.name + ' County' : '';
        tooltip.style.display = 'block';
        tooltip.style.left = (event.clientX + 14) + 'px';
        tooltip.style.top  = (event.clientY - 10) + 'px';
        tooltip.innerHTML = `
          <strong>${reg}${countyName ? ` <span style="opacity:.6;font-weight:500;font-size:0.8em">· ${countyName}</span>` : ''}</strong>
          <div class="tt-row">
            <span class="lbl">Bids</span><span><b>${r.bids}</b></span>
            <span class="lbl">Interviews</span><span><b>${r.iv}</b></span>
            <span class="lbl">Intent to Award</span><span><b>${r.ia}</b></span>
            <span class="lbl">Won</span><span style="color:#6EE7B7"><b>${r.won}</b></span>
            <span class="lbl">Lost</span><span style="color:#FCA5A5"><b>${r.lost}</b></span>
            <span class="lbl">Win Rate</span><span><b>${wr}</b></span>
            <span class="lbl">Active $</span><span><b>${r.activeValue > 0 ? CAPS.formatCurrency(r.activeValue) : '—'}</b></span>
            <span class="lbl">Won $</span><span><b>${r.value > 0 ? CAPS.formatCurrency(r.value) : '—'}</b></span>
          </div>
        `;
      })
      .on('mouseleave', () => { tooltip.style.display = 'none'; })
      .on('click', (event, d) => {
        const id = String(d.id).padStart(5,'0');
        const reg = regionFor(id);
        if (!reg) return;
        activeRegionFilter = (activeRegionFilter === reg) ? '' : reg;
        renderDashboard();
      });

    REGIONS.forEach(reg => {
      const feats = stateCounties.filter(f => regionFor(String(f.id).padStart(5,'0')) === reg);
      if (feats.length === 0) return;
      const c = path.centroid({ type: 'GeometryCollection', geometries: feats.map(f => f.geometry) });
      if (!c || isNaN(c[0]) || isNaN(c[1])) return;
      const r = regAgg[reg];
      const wr = r.winRate !== null ? (r.winRate*100).toFixed(0) + '%' : '—';
      const palette = regionPalette(state, reg);
      // Labels can be a bit long for some states (e.g. "Central / South / West TX"); widen the plate accordingly.
      const labelWidth = Math.max(110, reg.length * 6.8);
      const g = svg.append('g').attr('pointer-events','none').attr('transform', `translate(${c[0]},${c[1]})`);
      g.append('rect').attr('x', -labelWidth/2).attr('y', -22).attr('width', labelWidth).attr('height', 44)
        .attr('rx', 8).attr('fill', 'rgba(255,255,255,0.92)')
        .attr('stroke', palette.solid).attr('stroke-width', 1.5);
      g.append('text').attr('text-anchor','middle').attr('y',-4)
        .attr('font-family','Inter,sans-serif').attr('font-weight',700)
        .attr('font-size',12).attr('fill', palette.solid).text(reg);
      g.append('text').attr('text-anchor','middle').attr('y',13)
        .attr('font-family','Inter,sans-serif').attr('font-weight',600)
        .attr('font-size',10).attr('fill', '#334155')
        .text(`${r.bids} bids · WR ${wr}`);
    });

    const mesh = topojson.mesh(us, us.objects.counties, (a,b) => {
      const aId = String(a.id).padStart(5,'0'), bId = String(b.id).padStart(5,'0');
      if (!aId.startsWith(stateFips) || !bId.startsWith(stateFips)) return false;
      return regionFor(aId) !== regionFor(bId);
    });
    svg.append('path').datum(mesh).attr('fill','none').attr('stroke','#fff').attr('stroke-width',1.8).attr('d',path);

    /* ═════════ Award pins (Closed Won + Intent to Award for this state) ═════════ */
    // Build a county-name → feature lookup so we can place each pin on the exact county.
    const countyByName = {};
    stateCounties.forEach(f => {
      const nm = (f.properties && f.properties.name || '').toLowerCase().trim();
      if (nm && !countyByName[nm]) countyByName[nm] = f;
    });

    // Pre-compute region centroids as a safety-net when we can't resolve a specific county.
    const regionCentroidsFallback = {};
    REGIONS.forEach(reg => {
      const feats = stateCounties.filter(f => regionFor(String(f.id).padStart(5,'0')) === reg);
      if (feats.length === 0) return;
      const c = path.centroid({ type: 'GeometryCollection', geometries: feats.map(f => f.geometry) });
      if (c && !isNaN(c[0]) && !isNaN(c[1])) regionCentroidsFallback[reg] = c;
    });

    // Filter awards for this state (all-time Closed Won + Intent to Award).
    const awardsRaw = Array.isArray(window.CAPS_AWARDS_DATA) ? window.CAPS_AWARDS_DATA : [];
    const stateAwards = awardsRaw.filter(r => {
      const raw = r['Agency State'] || r['agencyState'] || '';
      const stName = normStateName(raw);
      const stage = r['Stage'] || r['stage'] || '';
      return stName === state && (stage === 'Closed Won' || stage === 'Intent to Award');
    });

    // Size scale: sqrt of amount → head radius. Base radius if no amount.
    const maxAmt = stateAwards.reduce((m, r) => {
      const v = parseFloat(String(r['Amount ($)'] ?? r.amount ?? '').replace(/[,$]/g, '')) || 0;
      return v > m ? v : m;
    }, 0);
    const radiusFor = (amount) => {
      if (!amount || !maxAmt) return 7;
      const t = Math.sqrt(amount) / Math.sqrt(maxAmt);
      return Math.max(6, Math.min(11, 6 + t * 5));
    };

    // Teardrop path — tip at origin (0,0), circular head of radius r centered at (0, -hc).
    // Requires hc > r so the external tangent is well-defined.
    function teardropPath(r, hc) {
      const s = r / hc;
      const c = Math.sqrt(Math.max(0, 1 - s * s));
      const tx = +(r * c).toFixed(2);
      const ty = +(-hc + r * s).toFixed(2);
      return `M 0,0 L ${-tx},${ty} A ${r},${r} 0 1 1 ${tx},${ty} Z`;
    }

    // Group awards by resolved county FIPS (fall back to region centroid if none).
    const pinGroups = new Map();
    stateAwards.forEach(aw => {
      const agency = aw['Agency'] || aw['agency'] || '';
      const feat = resolveCountyFeature(state, agency, countyByName);
      let key, anchor;
      if (feat) {
        key = 'c:' + String(feat.id).padStart(5, '0');
        anchor = path.centroid(feat);
      } else {
        const reg = classifyRegion(state, agency) || REGIONS[REGIONS.length - 1];
        key = 'r:' + reg;
        anchor = regionCentroidsFallback[reg];
      }
      if (!anchor || isNaN(anchor[0]) || isNaN(anchor[1])) return;
      if (!pinGroups.has(key)) pinGroups.set(key, { anchor, items: [] });
      pinGroups.get(key).items.push(aw);
    });

    const pinLayer = svg.append('g').attr('class', 'award-pins');

    // Sort groups by y so later (lower) pins render on top — nicer stacking on the map.
    const sortedGroups = Array.from(pinGroups.values()).sort((a, b) => a.anchor[1] - b.anchor[1]);
    sortedGroups.forEach(({ anchor, items }) => {
      const [cx, cy] = anchor;
      const n = items.length;
      const step = 11;  // horizontal stagger between pins in the same county
      items.forEach((aw, i) => {
        const offset = (i - (n - 1) / 2) * step;
        const x = cx + offset;
        const y = cy;  // tip anchored exactly at the county centroid

        const amountNum = parseFloat(String(aw['Amount ($)'] ?? aw.amount ?? '').replace(/[,$]/g, '')) || 0;
        const r = radiusFor(amountNum);
        const hc = r * 1.9;                     // head-center distance from tip
        const dotR = Math.max(2.2, r * 0.34);

        const stage = aw['Stage'] || aw['stage'] || '';
        const isWon = stage === 'Closed Won';
        const stageCls = isWon ? 'won' : 'ia';
        const agency = aw['Agency'] || aw['agency'] || '';
        const region = classifyRegion(state, agency);

        const g = pinLayer.append('g')
          .attr('class', 'award-pin-g')
          .attr('transform', `translate(${x.toFixed(2)},${y.toFixed(2)})`)
          .datum({ award: aw, agency, stage, amountNum, region });

        // Soft ground shadow under the tip
        g.append('ellipse')
          .attr('class', 'award-pin-shadow')
          .attr('cx', 0).attr('cy', 1.5)
          .attr('rx', r * 0.55).attr('ry', r * 0.18);

        // Teardrop body (tip sits exactly on the county centroid)
        g.append('path')
          .attr('class', `award-pin-body ${stageCls}`)
          .attr('d', teardropPath(r, hc));

        // White inner dot at the centre of the head
        g.append('circle')
          .attr('class', 'award-pin-dot')
          .attr('cx', 0).attr('cy', -hc)
          .attr('r', dotR);

        g.on('mousemove', (event, d) => {
          const dealName = d.award['Deal Name'] || d.award['dealName'] || '—';
          const awardedDate = d.award['Awarded Date'] || d.award['awardedDate'] || d.award['Intent to Award Date'] || '';
          const cat = d.award['Service Category'] || d.award['serviceCategory'] || '';
          tooltip.style.display = 'block';
          tooltip.style.left = (event.clientX + 14) + 'px';
          tooltip.style.top  = (event.clientY - 10) + 'px';
          const stageColor = d.stage === 'Closed Won' ? '#059669' : '#F59E0B';
          tooltip.innerHTML = `
            <strong>${escapeHTML(dealName)}</strong>
            <div class="tt-row">
              <span class="lbl">Agency</span><span><b>${escapeHTML(d.agency)}</b></span>
              ${d.region ? `<span class="lbl">Region</span><span><b>${escapeHTML(d.region)}</b></span>` : ''}
              <span class="lbl">Stage</span><span style="color:${stageColor}"><b>${escapeHTML(d.stage)}</b></span>
              ${d.amountNum > 0 ? `<span class="lbl">Amount</span><span><b>${CAPS.formatCurrency(d.amountNum)}</b></span>` : ''}
              ${cat ? `<span class="lbl">Category</span><span><b>${escapeHTML(cat)}</b></span>` : ''}
              ${awardedDate ? `<span class="lbl">Date</span><span><b>${escapeHTML(String(awardedDate).slice(0,10))}</b></span>` : ''}
            </div>
          `;
        }).on('mouseleave', () => { tooltip.style.display = 'none'; });
      });
    });

    legendEl.innerHTML = REGIONS.map(r => {
      const palette = regionPalette(state, r);
      return `
        <span class="map-legend__item">
          <span class="map-legend__sw ${palette.cls}"></span>
          ${r} — <strong style="color:var(--ca-gray-900)">${regAgg[r].bids} bids</strong>
        </span>
      `;
    }).join('') + `
      <span class="pin-legend">
        <span class="pin-legend__item"><span class="pin-legend__mark won"></span>Closed Won (${stateAwards.filter(a => (a['Stage']||a['stage']) === 'Closed Won').length})</span>
        <span class="pin-legend__item"><span class="pin-legend__mark ia"></span>Intent to Award (${stateAwards.filter(a => (a['Stage']||a['stage']) === 'Intent to Award').length})</span>
        <span class="pin-legend__item" style="color:var(--ca-gray-400);font-size:0.72rem">pin size ≈ deal $</span>
      </span>
    `;
  }

  /* ═════════ Awards state-name normaliser ═════════
     Maps raw HubSpot "Agency State" values (abbreviations, typos, etc.)
     to canonical full state names so we can aggregate the Awards data. */
  const US_STATE_FIPS = {
    '01':'Alabama','02':'Alaska','04':'Arizona','05':'Arkansas','06':'California',
    '08':'Colorado','09':'Connecticut','10':'Delaware','11':'District of Columbia',
    '12':'Florida','13':'Georgia','15':'Hawaii','16':'Idaho','17':'Illinois',
    '18':'Indiana','19':'Iowa','20':'Kansas','21':'Kentucky','22':'Louisiana',
    '23':'Maine','24':'Maryland','25':'Massachusetts','26':'Michigan','27':'Minnesota',
    '28':'Mississippi','29':'Missouri','30':'Montana','31':'Nebraska','32':'Nevada',
    '33':'New Hampshire','34':'New Jersey','35':'New Mexico','36':'New York',
    '37':'North Carolina','38':'North Dakota','39':'Ohio','40':'Oklahoma','41':'Oregon',
    '42':'Pennsylvania','44':'Rhode Island','45':'South Carolina','46':'South Dakota',
    '47':'Tennessee','48':'Texas','49':'Utah','50':'Vermont','51':'Virginia',
    '53':'Washington','54':'West Virginia','55':'Wisconsin','56':'Wyoming',
    '72':'Puerto Rico'
  };
  const US_STATE_ALIAS = {
    'ca':'California','n.y.':'New York','ny':'New York','nys':'New York',
    'tx':'Texas','fl':'Florida','wa':'Washington','d.c.':'District of Columbia',
    'dc':'District of Columbia','washington dc':'District of Columbia',
    'illinios':'Illinois','massachussetts':'Massachusetts','masssachusetts':'Massachusetts',
    'chicago':'Illinois', 'missourie':'Missouri', 'missouri ':'Missouri',
    'texas ':'Texas','kansas ':'Kansas','new york':'New York',
    'missouri':'Missouri','oregon':'Oregon'
  };
  const TARGET_STATE_SET = new Set(['California','New York','Texas','Florida']);

  function normStateName(raw) {
    const s = String(raw || '').trim();
    if (!s) return '';
    const lower = s.toLowerCase();
    if (US_STATE_ALIAS[lower]) return US_STATE_ALIAS[lower];
    for (const name of Object.values(US_STATE_FIPS)) {
      if (name.toLowerCase() === lower) return name;
    }
    return s;
  }

  /* ════════════════ Regional charts (state-agnostic) ════════════════ */
  function buildPipelineChart(state, regAgg, REGIONS) {
    chPipeline = new Chart(document.getElementById('ch-pipeline'), {
      type: 'bar',
      data: {
        labels: REGIONS,
        datasets: [
          {
            label: 'Active pipeline $ (in flight)',
            data: REGIONS.map(r => regAgg[r].activeValue || 0),
            backgroundColor: REGIONS.map(r => regionPalette(state, r).alpha),
            borderColor:     REGIONS.map(r => regionPalette(state, r).solid),
            borderWidth: 1, borderRadius: 5, barPercentage: 0.55,
          },
          {
            label: 'Closed Won $ (booked)',
            data: REGIONS.map(r => regAgg[r].value || 0),
            backgroundColor: REGIONS.map(() => 'rgba(5,150,105,0.45)'),
            borderColor:     REGIONS.map(() => '#059669'),
            borderWidth: 1, borderRadius: 5, barPercentage: 0.55,
          }
        ]
      },
      options: {
        indexAxis: 'y',
        responsive: true, maintainAspectRatio: false,
        layout: { padding: { top: 10, right: 40, left: 4, bottom: 4 } },
        plugins: {
          legend: { position: 'top', align: 'end', labels: { padding: 14, font: { size: 12 } } },
          tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${CAPS.formatCurrency(ctx.parsed.x)}` } },
          datalabels: {
            display: ctx => ctx.dataset.data[ctx.dataIndex] > 0,
            anchor: 'end', align: 'right',
            formatter: v => CAPS.formatCurrency(v),
            font: { weight: '700', size: 10 },
            color: (ctx) => ctx.datasetIndex === 0 ? regionPalette(state, REGIONS[ctx.dataIndex]).solid : '#059669',
            clamp: true,
          }
        },
        scales: {
          x: { beginAtZero: true, grid: { color: '#F2F4F7' }, ticks: { callback: v => CAPS.formatCurrency(v) } },
          y: { grid: { display: false } }
        }
      }
    });
  }

  function renderHeatmap(state, catRegion, REGIONS) {
    const rows = Object.entries(catRegion).map(([cat, rMap]) => {
      let totalDecided = 0, totalBids = 0, totalWon = 0;
      REGIONS.forEach(r => {
        const c = rMap[r] || { bids:0, won:0, lost:0 };
        totalBids    += c.bids;
        totalWon     += c.won;
        totalDecided += c.won + c.lost;
      });
      return { cat, rMap, totalBids, totalDecided, totalWon };
    }).filter(r => r.totalBids >= 2).sort((a,b) => b.totalBids - a.totalBids).slice(0, 12);

    if (rows.length === 0) {
      document.getElementById('heatmap-wrap').innerHTML =
        '<div style="padding:40px;text-align:center;color:var(--ca-gray-400)">Not enough category data yet.</div>';
      return;
    }

    function cellHTML(cell) {
      if (!cell || cell.bids === 0) return '<span class="hm-cell empty">—</span>';
      const decided = cell.won + cell.lost;
      if (decided === 0) {
        return `<span class="hm-cell" style="background:#F1F5F9;color:#64748B">
                  ${cell.bids} bid${cell.bids===1?'':'s'}
                  <span class="hm-cell__sub">in progress</span>
                </span>`;
      }
      const wr = cell.won / decided;
      const bg = wr >= 0.6 ? '#ECFDF5' : wr >= 0.3 ? '#FFFBEB' : '#FEF2F2';
      const fg = wr >= 0.6 ? '#047857' : wr >= 0.3 ? '#B45309' : '#B91C1C';
      return `<span class="hm-cell" style="background:${bg};color:${fg}">
                ${(wr*100).toFixed(0)}%
                <span class="hm-cell__sub">${cell.won}W / ${cell.lost}L · ${cell.bids} bid${cell.bids===1?'':'s'}</span>
              </span>`;
    }

    let html = '<table class="heatmap-table"><thead><tr><th class="left-col">Service Category</th>';
    REGIONS.forEach(r => html += `<th>${r}</th>`);
    html += `<th>${escapeHTML(state)} Total</th></tr></thead><tbody>`;
    rows.forEach(row => {
      html += `<tr><td class="category-cell">${escapeHTML(row.cat)}</td>`;
      REGIONS.forEach(reg => html += `<td>${cellHTML(row.rMap[reg])}</td>`);
      const totWR = row.totalDecided > 0 ? (row.totalWon/row.totalDecided*100).toFixed(0) + '%' : '—';
      html += `<td><strong>${totWR}</strong><div style="font-size:0.66rem;color:var(--ca-gray-500)">${row.totalBids} bid${row.totalBids===1?'':'s'}</div></td>`;
      html += '</tr>';
    });
    html += '</tbody></table>';
    document.getElementById('heatmap-wrap').innerHTML = html;
  }

  /* ════════════════ States Awards Table ════════════════
     Aggregates CAPS_AWARDS_DATA (Closed Won + Intent to Award, all-time) by
     normalised state name and shows ALL states with awards. The currently-
     selected state row is highlighted and auto-scrolled into view. Each
     column header is clickable-to-sort, and each column has a filter input. */
  const TOP_STATES_STATE = {
    sortKey: 'count',
    sortDir: 'desc',
    filters: { state: '', count: '', value: '' }
  };

  function aggregateAwardsByState() {
    const awardsRaw = Array.isArray(window.CAPS_AWARDS_DATA) ? window.CAPS_AWARDS_DATA : [];
    const perState = {};
    let totalWonCount = 0, totalIaCount = 0, totalWonValue = 0, totalIaValue = 0;
    awardsRaw.forEach(r => {
      const raw = r['Agency State'] || r['agencyState'] || '';
      const stage = r['Stage'] || r['stage'] || '';
      const amount = parseFloat(String(r['Amount ($)'] ?? r.amount ?? '').replace(/[,$]/g, '')) || 0;
      const isWon = stage === 'Closed Won';
      const isIA  = stage === 'Intent to Award';
      if (!isWon && !isIA) return;
      const name = normStateName(raw) || '(Unknown)';
      if (!perState[name]) perState[name] = { state: name, count: 0, value: 0, won: 0, ia: 0, wonValue: 0, iaValue: 0 };
      const s = perState[name];
      s.count++; s.value += amount;
      if (isWon) { s.won++; s.wonValue += amount; totalWonCount++; totalWonValue += amount; }
      else       { s.ia++;  s.iaValue  += amount; totalIaCount++;  totalIaValue  += amount; }
    });
    return {
      rows: Object.values(perState),
      totals: {
        count: totalWonCount + totalIaCount,
        value: totalWonValue + totalIaValue,
        won: totalWonCount, ia: totalIaCount
      }
    };
  }

  /* Parse a numeric filter like "≥5", ">=100", ">5", "<20", "5-10", "=3", or "50000".
     Returns a predicate (v) => bool. Empty / invalid → pass-through. */
  function parseNumericFilter(raw) {
    const s = String(raw || '').trim().replace(/[\s,$_]/g, '');
    if (!s) return () => true;
    let m;
    if ((m = s.match(/^(?:>=|≥)(-?\d+(?:\.\d+)?)$/))) { const n = +m[1]; return v => v >= n; }
    if ((m = s.match(/^(?:<=|≤)(-?\d+(?:\.\d+)?)$/))) { const n = +m[1]; return v => v <= n; }
    if ((m = s.match(/^>(-?\d+(?:\.\d+)?)$/)))        { const n = +m[1]; return v => v >  n; }
    if ((m = s.match(/^<(-?\d+(?:\.\d+)?)$/)))        { const n = +m[1]; return v => v <  n; }
    if ((m = s.match(/^=?(-?\d+(?:\.\d+)?)$/)))       { const n = +m[1]; return v => v === n; }
    if ((m = s.match(/^(-?\d+(?:\.\d+)?)[-–to]+(-?\d+(?:\.\d+)?)$/i))) {
      const a = +m[1], b = +m[2]; const lo = Math.min(a,b), hi = Math.max(a,b);
      return v => v >= lo && v <= hi;
    }
    const n = parseFloat(s);
    if (!isNaN(n)) return v => v >= n;   // bare number treated as ≥
    return () => true;
  }

  function buildTopStatesTable() {
    const tbody = document.getElementById('top-states-tbody');
    const foot  = document.getElementById('top-states-foot');
    const badge = document.getElementById('top-states-badge');
    if (!tbody) return;

    const { rows: allRows, totals } = aggregateAwardsByState();

    // Show ALL states that have awards (was previously top 4 only)
    const allStates = allRows.slice();

    // Apply filters
    const stateQ  = (TOP_STATES_STATE.filters.state || '').trim().toLowerCase();
    const countOK = parseNumericFilter(TOP_STATES_STATE.filters.count);
    const valueOK = parseNumericFilter(TOP_STATES_STATE.filters.value);

    let filtered = allStates.filter(r =>
      (!stateQ || r.state.toLowerCase().includes(stateQ)) &&
      countOK(r.count) &&
      valueOK(r.value)
    );

    // Sort
    const dir = TOP_STATES_STATE.sortDir === 'asc' ? 1 : -1;
    filtered.sort((a, b) => {
      const k = TOP_STATES_STATE.sortKey;
      if (k === 'state') return dir * a.state.localeCompare(b.state);
      return dir * ((a[k] || 0) - (b[k] || 0));
    });

    if (filtered.length === 0) {
      tbody.innerHTML = `<tr><td colspan="3" class="top-states-empty">No states match these filters.</td></tr>`;
      foot.innerHTML = '';
    } else {
      tbody.innerHTML = filtered.map(r => {
        const isTarget = TARGET_STATE_SET.has(r.state);
        const isActive = r.state === activeState;
        const cls = [isTarget ? 'is-target' : '', isActive ? 'is-active' : ''].filter(Boolean).join(' ');
        const star = isTarget ? '<span class="target-star" title="target state">★</span>' : '';
        const activeBadge = isActive ? ' <span style="font-size:0.65rem;font-weight:700;color:var(--ca-navy);background:#fff;padding:1px 6px;border-radius:10px;border:1px solid var(--ca-navy);margin-left:4px;vertical-align:middle">SELECTED</span>' : '';
        return `
          <tr class="${cls}" data-state-name="${escapeHTML(r.state)}" title="Click to drill into ${escapeHTML(r.state)}">
            <td class="state-name">${escapeHTML(r.state)}${star}${activeBadge}
              <div style="font-size:0.7rem;font-weight:500;color:var(--ca-gray-500);margin-top:2px">
                ${r.won} won · ${r.ia} IA
              </div>
            </td>
            <td class="num"><strong>${r.count}</strong></td>
            <td class="num">${r.value > 0 ? CAPS.formatCurrency(r.value) : '—'}</td>
          </tr>
        `;
      }).join('');

      const totalCount = filtered.reduce((s, r) => s + r.count, 0);
      const totalValue = filtered.reduce((s, r) => s + r.value, 0);
      foot.innerHTML = `
        <td class="state-name">${filtered.length === allStates.length ? 'All states' : filtered.length + ' of ' + allStates.length + ' states'}</td>
        <td class="num">${totalCount}</td>
        <td class="num">${totalValue > 0 ? CAPS.formatCurrency(totalValue) : '—'}</td>
      `;
    }

    // Sort arrow rendering
    const table = document.getElementById('top-states-table');
    table.querySelectorAll('thead tr:first-child th').forEach(th => {
      const key = th.dataset.sortKey;
      if (!key) return;
      const arrow = th.querySelector('.sort-arrow');
      if (key === TOP_STATES_STATE.sortKey) {
        th.classList.add('is-sorted');
        arrow.textContent = TOP_STATES_STATE.sortDir === 'asc' ? '▲' : '▼';
      } else {
        th.classList.remove('is-sorted');
        arrow.textContent = '↕';
      }
    });

    if (badge) {
      badge.textContent = `${allStates.length} states · ${totals.count} awards total (${totals.won} won · ${totals.ia} IA)`;
    }

    // Scroll the selected row into view inside the scrollable wrap
    const wrap = document.querySelector('.top-states-wrap');
    const activeRow = tbody.querySelector('tr.is-active');
    if (wrap && activeRow) {
      const rowTop = activeRow.offsetTop;
      const rowBot = rowTop + activeRow.offsetHeight;
      if (rowTop < wrap.scrollTop || rowBot > wrap.scrollTop + wrap.clientHeight) {
        wrap.scrollTop = Math.max(0, rowTop - wrap.clientHeight / 2 + activeRow.offsetHeight / 2);
      }
    }
  }

  function bindTopStatesTable() {
    const table = document.getElementById('top-states-table');
    if (!table || table.dataset.bound === '1') return;
    table.dataset.bound = '1';

    // Header sort
    table.querySelectorAll('thead tr:first-child th').forEach(th => {
      th.addEventListener('click', () => {
        const key = th.dataset.sortKey; if (!key) return;
        if (TOP_STATES_STATE.sortKey === key) {
          TOP_STATES_STATE.sortDir = TOP_STATES_STATE.sortDir === 'asc' ? 'desc' : 'asc';
        } else {
          TOP_STATES_STATE.sortKey = key;
          TOP_STATES_STATE.sortDir = (key === 'state') ? 'asc' : 'desc';
        }
        buildTopStatesTable();
      });
    });

    // Per-column filter inputs
    table.querySelectorAll('.col-filter').forEach(inp => {
      inp.addEventListener('input', () => {
        const col = inp.dataset.col;
        TOP_STATES_STATE.filters[col] = inp.value;
        buildTopStatesTable();
      });
    });

    // Click any state row → switch the active state (target states get full regional view,
    // other states get the basic stats view)
    document.getElementById('top-states-tbody').addEventListener('click', (ev) => {
      const tr = ev.target.closest('tr[data-state-name]'); if (!tr) return;
      const nm = tr.dataset.stateName;
      if (nm && nm !== activeState) {
        activeState = nm; activeRegionFilter = ''; activeSearch = '';
        renderDashboard();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });
  }

  /* ════════════════ Awards Table ════════════════ */
  function bindAwardsTable(awards) {
    function sortArrows(col) {
      const active = activeSort === col;
      return `<span class="sort-arrows">
        <span class="arr${active && activeSortDir==='asc' ?' on':''}">▲</span>
        <span class="arr${active && activeSortDir==='desc'?' on':''}">▼</span>
      </span>`;
    }

    function regionChip(reg) {
      if (!reg) return '<span class="region-chip none">—</span>';
      const cfg = STATE_CONFIG[activeState];
      if (!cfg) return `<span class="region-chip none">${escapeHTML(reg)}</span>`;
      const idx = cfg.regions.indexOf(reg);
      if (idx < 0) return `<span class="region-chip none">${escapeHTML(reg)}</span>`;
      return `<span class="region-chip ${REGION_PALETTE[idx].cls}">${escapeHTML(reg)}</span>`;
    }

    function buildTable(rows) {
      if (!rows.length) return '<div style="text-align:center;padding:48px;color:var(--ca-gray-500)">No awards yet in the selected filters.</div>';
      const showRegionCol = true; // every target state now has regions
      return `<table class="aw-table">
        <thead><tr>
          <th style="width:36px">#</th>
          <th class="${activeSort==='deal'?'sort-active':''}" data-sort="deal">Deal ${sortArrows('deal')}</th>
          <th class="${activeSort==='agency'?'sort-active':''}" data-sort="agency">Agency ${sortArrows('agency')}</th>
          ${showRegionCol ? `<th class="${activeSort==='region'?'sort-active':''}" data-sort="region">Region ${sortArrows('region')}</th>` : ''}
          <th class="${activeSort==='category'?'sort-active':''}" data-sort="category">Category ${sortArrows('category')}</th>
          <th class="${activeSort==='awardedDate'?'sort-active':''}" data-sort="awardedDate">Awarded ${sortArrows('awardedDate')}</th>
          <th class="right ${activeSort==='amount'?'sort-active':''}" data-sort="amount">Amount ${sortArrows('amount')}</th>
          <th>HubSpot</th>
        </tr></thead>
        <tbody>${rows.map((d, i) => {
          const dealCell = d.hubspotLink
            ? `<a class="aw-link" href="${escapeHTML(d.hubspotLink)}" target="_blank" rel="noreferrer noopener">${escapeHTML(d.dealName || '(Untitled)')}</a>`
            : escapeHTML(d.dealName || '(Untitled)');
          const dt = d.awardedDate || d.bidClosingDate || d.submissionDate;
          return `<tr>
            <td style="color:var(--ca-gray-400);font-size:0.8rem">${i+1}</td>
            <td>${dealCell}</td>
            <td>${escapeHTML(d.agency || '—')}</td>
            ${showRegionCol ? `<td>${regionChip(d._region)}</td>` : ''}
            <td>${escapeHTML(d.serviceCategory || '—')}</td>
            <td>${dt ? CAPS.formatDate(dt) : '—'}</td>
            <td class="right">${d.amount ? CAPS.formatCurrency(d.amount) : '—'}</td>
            <td>${d.hubspotLink ? `<a href="${escapeHTML(d.hubspotLink)}" target="_blank" rel="noreferrer noopener" style="color:var(--ca-blue);font-weight:600;text-decoration:none">View ↗</a>` : '—'}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>`;
    }

    function getSortedFiltered() {
      let rows = [...awards];
      if (activeSearch) {
        const q = activeSearch.toLowerCase();
        rows = rows.filter(d =>
          (d.dealName || '').toLowerCase().includes(q) ||
          (d.agency || '').toLowerCase().includes(q) ||
          (d.serviceCategory || '').toLowerCase().includes(q) ||
          (d._region || '').toLowerCase().includes(q)
        );
      }
      rows.sort((a, b) => {
        function cmp(x, y) {
          if (x instanceof Date && y instanceof Date) return x - y;
          if (typeof x === 'number' && typeof y === 'number') return x - y;
          return String(x || '').localeCompare(String(y || ''));
        }
        let va, vb;
        if (activeSort === 'deal')         { va = a.dealName; vb = b.dealName; }
        else if (activeSort === 'agency')  { va = a.agency;   vb = b.agency; }
        else if (activeSort === 'region')  { va = a._region;  vb = b._region; }
        else if (activeSort === 'category'){ va = a.serviceCategory; vb = b.serviceCategory; }
        else if (activeSort === 'awardedDate') {
          va = a.awardedDate || a.bidClosingDate || a.submissionDate || new Date(0);
          vb = b.awardedDate || b.bidClosingDate || b.submissionDate || new Date(0);
        }
        else if (activeSort === 'amount') { va = a.amount || 0; vb = b.amount || 0; }
        const c = cmp(va, vb);
        return activeSortDir === 'desc' ? -c : c;
      });
      return rows;
    }

    function refreshTable() {
      const rows = getSortedFiltered();
      document.getElementById('aw-table').innerHTML = buildTable(rows);
      document.getElementById('tbl-count').textContent = rows.length + ' award' + (rows.length === 1 ? '' : 's');
      document.getElementById('search-count').innerHTML = activeSearch ? `<strong>${rows.length}</strong> of ${awards.length}` : '';
      document.querySelectorAll('.aw-table thead th[data-sort]').forEach(th => {
        th.addEventListener('click', () => {
          const col = th.dataset.sort;
          if (activeSort === col) activeSortDir = activeSortDir === 'desc' ? 'asc' : 'desc';
          else {
            activeSort = col;
            activeSortDir = (col === 'amount' || col === 'awardedDate') ? 'desc' : 'asc';
          }
          refreshTable();
        });
      });
    }
    refreshTable();

    const searchEl = document.getElementById('aw-search');
    const clearEl  = document.getElementById('search-clear');
    searchEl.addEventListener('input', e => {
      activeSearch = e.target.value;
      clearEl.style.display = activeSearch ? 'block' : 'none';
      refreshTable();
    });
    clearEl.addEventListener('click', () => { activeSearch = ''; searchEl.value = ''; clearEl.style.display = 'none'; refreshTable(); });
  }

  function escapeHTML(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  renderDashboard();
</script>
